<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASG - 무료 이미지 검색</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f8f9fa; }
        
        /* 🌟 세련된 버튼 & 인풋 스타일 */
        .btn-primary { 
            padding: 12px 20px; background-color: #007bff; color: white; border: none; 
            border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; 
            transition: all 0.2s ease-in-out; box-shadow: 0 2px 4px rgba(0, 123, 255, 0.15);
        }
        .btn-primary:hover { 
            background-color: #0056b3; transform: translateY(-1px); box-shadow: 0 4px 10px rgba(0, 123, 255, 0.3);
        }

        .form-control {
            width: 100%; max-width: 600px; padding: 12px 15px; border: 1px solid #ced4da;
            border-radius: 8px; font-size: 15px; transition: border-color 0.2s; box-sizing: border-box;
        }
        .form-control:focus { outline: none; border-color: #007bff; box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1); }
        
        /* 🌟 모달 배경 */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(3px);
            z-index: 1000; justify-content: center; align-items: center;
        }

        /* 🌟 모달 컨테이너 (스크롤 분리 구조) */
        .modal-content {
            background: #fff; border-radius: 12px; width: 90%; max-width: 700px; height: 85vh; 
            display: flex; flex-direction: column; position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); overflow: hidden;
        }

        /* 🌟 상단 고정 영역 */
        .modal-header-sticky { padding: 25px 25px 15px 25px; background: #fff; border-bottom: 1px solid #eaeaea; z-index: 10; }
        /* 🌟 하단 스크롤 영역 */
        .modal-body-scroll { padding: 20px 25px; overflow-y: auto; flex: 1; }

        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 28px; font-weight: bold; cursor: pointer; color: #aaa; transition: 0.2s; }
        .close-btn:hover { color: #333; }

        /* 갤러리 그리드 */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .gallery-grid img { width: 100%; height: 130px; object-fit: cover; border-radius: 8px; cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
        .gallery-grid img:hover { transform: scale(1.03); border-color: #007bff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <h2>새 게시물 작성 (SNS 발행 폼 예시)</h2>
    
    <button type="button" id="btnOpenPexelsModal" class="btn-primary">무료 이미지 찾아보기 🔍</button>
    <br><br>
    <label style="font-weight: bold; margin-bottom: 5px; display: block;">첨부할 이미지 URL:</label>
    <input type="text" id="finalImageUrl" class="form-control" placeholder="선택된 이미지의 URL이 이곳에 들어갑니다" readonly>

    <div id="pexelsModal" class="modal-overlay">
        <div class="modal-content">
            <span id="btnClosePexelsModal" class="close-btn">&times;</span>
            
            <div class="modal-header-sticky">
                <h3 style="margin: 0 0 15px 0; color: #333;">무료 스톡 이미지 검색</h3>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="pexelsQuery" class="form-control" placeholder="검색어 (예: 카페, 하늘, 코딩)" style="flex: 1;">
                    <button type="button" id="btnSearchPexels" class="btn-primary">검색</button>
                </div>
            </div>
            
            <div class="modal-body-scroll" id="modalBodyScroll">
                <div id="pexelsGallery" class="gallery-grid"></div>
                
                <div style="text-align: center; margin-top: 25px; margin-bottom: 10px;">
                    <button type="button" id="btnLoadMorePexels" class="btn-primary" style="display: none; width: 100%; background-color: #6c757d;">결과 더보기 🔽</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const modal = document.getElementById('pexelsModal');
        const btnOpen = document.getElementById('btnOpenPexelsModal');
        const btnClose = document.getElementById('btnClosePexelsModal');
        const btnSearch = document.getElementById('btnSearchPexels');
        const btnLoadMore = document.getElementById('btnLoadMorePexels'); 
        const inputQuery = document.getElementById('pexelsQuery');
        const pexelsGallery = document.getElementById('pexelsGallery');
        const finalInput = document.getElementById('finalImageUrl');
        const scrollArea = document.getElementById('modalBodyScroll');

        let currentPage = 1;
        let currentQuery = '';

        // 모달 열기/닫기
        btnOpen.addEventListener('click', () => modal.style.display = 'flex');
        btnClose.addEventListener('click', () => modal.style.display = 'none');
        window.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });

        // 새 검색
        btnSearch.addEventListener('click', () => {
            const query = inputQuery.value.trim();
            if (!query) { alert("검색어를 입력해주세요!"); return; }

            currentQuery = query;
            currentPage = 1;
            pexelsGallery.innerHTML = '<p style="grid-column: 1 / -1; text-align:center; color:#666; margin-top:20px;">이미지 검색 중...</p>';
            btnLoadMore.style.display = 'none'; 
            scrollArea.scrollTop = 0; // 스크롤 맨 위로 초기화
            
            fetchImages(false); 
        });

        inputQuery.addEventListener('keypress', (e) => { if (e.key === 'Enter') btnSearch.click(); });

        // 더보기
        btnLoadMore.addEventListener('click', () => {
            currentPage++; 
            const originalText = btnLoadMore.innerText;
            btnLoadMore.innerText = '불러오는 중... ⏳';
            
            fetchImages(true).then(() => { btnLoadMore.innerText = originalText; }); 
        });

        // API 호출 로직
        async function fetchImages(isAppend) {
            try {
                const response = await fetch(`/api/sns/pexels/search?query=${encodeURIComponent(currentQuery)}&page=${currentPage}`);
                if (!response.ok) throw new Error('서버 통신 실패');

                const data = await response.json();

                if (!isAppend) pexelsGallery.innerHTML = '';

                if (!data.photos || data.photos.length === 0) {
                    if (!isAppend) pexelsGallery.innerHTML = '<p style="grid-column: 1 / -1; text-align:center;">검색 결과가 없습니다.</p>';
                    btnLoadMore.style.display = 'none'; 
                    return;
                }

                renderGallery(data.photos);
                btnLoadMore.style.display = 'block';

            } catch (error) {
                if (!isAppend) pexelsGallery.innerHTML = '<p style="color:red; grid-column: 1 / -1; text-align:center;">오류가 발생했습니다.</p>';
                console.error(error);
            }
        }

        // 갤러리 렌더링
        function renderGallery(photos) {
            photos.forEach(photo => {
                const img = document.createElement('img');
                img.src = photo.src.medium; 
                
                img.addEventListener('click', () => {
                    finalInput.value = photo.src.large; 
                    modal.style.display = 'none';       
                });

                pexelsGallery.appendChild(img);
            });
        }
    </script>
</body>
</html>
