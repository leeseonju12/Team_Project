<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>소셜다모아 — 리뷰/댓글 AI 답변 관리</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet" />
<style>
    /*
      디자인 토큰화 및 확장 팔레트 적용
      - 모든 하드코딩된 HEX 및 RGBA 값을 :root 변수로 추상화
      - 형광색(#99F6E4)을 가독성 높은 Teal 300(#5EEAD4)으로 전면 교체
      - 플랫폼 및 상태별 색상도 토큰으로 관리하여 중앙 통제력 강화
    */
    :root {
      /* Base Colors */
      --teal: #14B8A6;
      --teal-light: #CCFBF1;
      --teal-dark: #0F766E;
      --teal-50: #F0FDFA;
      --teal-300: #5EEAD4; /* 대체된 메인 강조/보더 색상 */
      --teal-alpha-10: rgba(20, 184, 166, 0.1);
      --teal-alpha-24: rgba(20, 184, 166, 0.24);

      --indigo: #6366F1;
      --indigo-light: #EEF2FF;
      --indigo-dark: #4338CA;
      --indigo-200: #C7D2FE;
      --indigo-alpha-20: rgba(99, 102, 241, 0.20);
      --indigo-alpha-24: rgba(99, 102, 241, 0.24);
      --indigo-alpha-26: rgba(99, 102, 241, 0.26);

      --blue: #3B82F6;
      --blue-light: #DBEAFE;
      --blue-light-alt: #7DD3FC;
      --blue-dark: #1D4ED8;
      --blue-alpha-28: rgba(59, 130, 246, 0.28);

      --slate: #F8FAFC;
      --slate2: #F1F5F9;
      --slate3: #E2E8F0;
      --slate-600: #475569;
      --slate-700: #334155;
      --slate-alpha-80: rgba(248, 250, 252, 0.8);
      --slate-700-alpha-20: rgba(51, 65, 85, 0.2);

      --text: #0F172A;
      --text2: #475569;
      --text3: #94A3B8;

      --white: #FFFFFF;
      --white-alpha-65: rgba(238, 242, 255, 0.65);

      --border: #E2E8F0;
      --border2: #CBD5E1;
      --border-alpha-80: rgba(226, 232, 240, 0.8);

      --green: #22C55E;
      --green-light: #DCFCE7;
      --green-dark: #15803D;

      --red: #EF4444;
      --red-light: #FEE2E2;
      --red-dark: #B91C1C;

      --yellow: #F59E0B;
      --yellow-light: #FEF3C7;
      --yellow-dark: #92400E;

      --orange: #F97316;
      --orange-light: #FFEDD5;
      --orange-dark: #C2410C;

      /* Platform Badge Colors */
      --plat-nv-bg: #ECFDF5; --plat-nv-text: #065F46; --plat-nv-dot: #03C75A;
      --plat-kk-bg: #FFFBEB; --plat-kk-text: #92400E; --plat-kk-dot: #F59E0B;
      --plat-gm-bg: #FEF2F2; --plat-gm-text: #991B1B; --plat-gm-dot: #EA4335;
      --plat-ig-bg: #FDF2F8; --plat-ig-text: #9D174D; --plat-ig-dot: #E1306C;
      --plat-fb-bg: #EFF6FF; --plat-fb-text: #1D4ED8; --plat-fb-dot: #1877F2;

      /* Functional UI Colors */
      --reply-bg-start: rgba(204, 251, 241, 0.35);
      --reply-bg-end: rgba(220, 252, 231, 0.48);

      /* Layout & Shadows */
      --radius: 14px;
      --radius-sm: 8px;
      --radius-xs: 6px;
      --shadow-sm: 0 1px 3px rgba(15, 23, 42, .07), 0 1px 2px rgba(15, 23, 42, .04);
      --shadow: 0 6px 18px rgba(15, 23, 42, .08), 0 2px 8px rgba(15, 23, 42, .05);
      --shadow-lg: 0 12px 32px rgba(15, 23, 42, .14), 0 6px 16px rgba(15, 23, 42, .08);
      --toolbar-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--slate);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .top-stripe {
      height: 4px;
      background: linear-gradient(90deg, var(--teal) 0%, var(--indigo) 55%, var(--blue-light-alt) 100%);
    }


    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--teal-light);
      border: 1px solid var(--teal-300);
      color: var(--teal-dark);
      border-radius: 999px;
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 600;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--teal);
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0%,
      100% { opacity: 1; transform: scale(1) }
      50% { opacity: .55; transform: scale(.8) }
    }

    .page {
      max-width: 1520px;
      margin: 0 auto;
      padding: 28px 40px 80px;
    }

    .hero {
      background: linear-gradient(135deg, var(--white), var(--white-alpha-65));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      box-shadow: var(--shadow-sm);
      margin-bottom: 22px;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -.3px;
    }

    .hero h1 em {
      font-style: italic;
      background: linear-gradient(135deg, var(--teal), var(--indigo));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      margin-top: 5px;
      font-size: 12px;
      color: var(--text2);
      line-height: 1.6;
    }

    .hero-kpis {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .kpi {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 16px;
      min-width: 98px;
      text-align: center;
      box-shadow: var(--shadow-sm);
    }

    .kpi-n { font-size: 20px; font-weight: 800; line-height: 1; }
    .kpi-n.teal { color: var(--teal-dark); }
    .kpi-n.red { color: var(--red); }
    .kpi-n.indigo { color: var(--indigo-dark); }
    .kpi-n.green { color: var(--green-dark); }
    .kpi-l { font-size: 10px; color: var(--text3); margin-top: 4px; font-weight: 600; }

    .sent-banner {
      display: none;
      background: linear-gradient(135deg, var(--teal-light), var(--green-light));
      border: 1.5px solid var(--teal-300);
      border-radius: var(--radius);
      padding: 16px 20px;
      text-align: center;
      margin-bottom: 18px;
    }

    .sent-banner.show { display: block; }
    .sent-banner strong { font-size: 15px; color: var(--teal-dark); }
    .sent-banner p { font-size: 12px; color: var(--text2); margin-top: 4px; }

    .progress-wrap {
      display: none;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 16px 20px;
      margin-bottom: 18px;
    }

    .progress-wrap.visible { display: block; }
    .progress-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .progress-top span { font-size: 12px; font-weight: 700; color: var(--indigo-dark); }
    .progress-bar { height: 7px; background: var(--slate3); border-radius: 999px; overflow: hidden; }
    .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--teal), var(--indigo)); transition: width .35s ease; }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      position: sticky;
      top: 64px;
      z-index: 100;
      padding: 14px 22px; 
      margin-bottom: 20px; 
      background: var(--slate-alpha-80); 
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-alpha-80);
      box-shadow: var(--toolbar-shadow);
    }

    .toolbar-left { display: flex; flex-direction: column; gap: 12px; flex: 1; min-width: 320px; }
    .toolbar-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 999px;
      padding: 7px 14px;
      width: max-content;
      box-shadow: var(--shadow-sm);
    }
    .search-box:focus-within { border-color: var(--teal); box-shadow: 0 0 0 3px var(--teal-alpha-10); }
    .search-box input { border: none; outline: none; background: transparent; font-size: 12px; color: var(--text); width: 240px; font-family: 'Noto Sans KR', sans-serif; }

    .btn-main, .btn-sync, .btn-send {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border: none;
      border-radius: var(--radius-sm);
      color: var(--white);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      transition: all .18s;
      white-space: nowrap;
    }
    
    .btn-sync { background: linear-gradient(135deg, var(--blue), var(--indigo)); box-shadow: 0 4px 12px var(--blue-alpha-28); }
    .btn-main { background: linear-gradient(135deg, var(--indigo), var(--teal)); box-shadow: 0 4px 12px var(--indigo-alpha-20); }
    .btn-send { background: linear-gradient(135deg, var(--teal), #3E8DCE); box-shadow: 0 4px 12px var(--teal-alpha-24); }

    .btn-main:hover, .btn-send:hover, .btn-sync:hover { transform: translateY(-1px); }
    .btn-main:disabled, .btn-send:disabled, .btn-sync:disabled { opacity: .45; cursor: not-allowed; transform: none; }

    .filter-menu { display: flex; gap: 10px; flex-wrap: wrap; position: relative; z-index: 20; }
    .filter-dropdown { position: relative; }

    .filter-trigger {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--white);
      color: var(--text2);
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: all .16s;
      min-width: 132px;
      justify-content: space-between;
    }

    .filter-trigger:hover, .filter-dropdown:hover .filter-trigger { border-color: var(--indigo-200); background: var(--indigo-light); color: var(--indigo-dark); }
    .filter-trigger.active { border-color: var(--teal-300); background: linear-gradient(135deg, var(--teal-light), var(--teal-50)); color: var(--teal-dark); }

    .filter-panel {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      min-width: 230px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow-lg);
      padding: 8px;
      opacity: 0;
      visibility: hidden;
      transform: translateY(8px);
      transition: all .18s ease;
      z-index: 1;
    }
    .filter-dropdown:hover .filter-panel { opacity: 1; visibility: visible; transform: translateY(0); }

    .filter-panel-title { padding: 8px 10px 10px; font-size: 11px; font-weight: 800; color: var(--text3); border-bottom: 1px solid var(--border); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
    .filter-option { width: 100%; border: none; background: transparent; text-align: left; padding: 10px 12px; border-radius: 10px; font-size: 12px; font-weight: 700; color: var(--text2); cursor: pointer; transition: all .14s; font-family: 'Noto Sans KR', sans-serif; }
    .filter-option:hover { background: var(--slate2); color: var(--text); }
    .filter-option.active { background: var(--teal-light); color: var(--teal-dark); }

    .table-wrap { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-sm); overflow: hidden; }
    .table-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; padding: 13px 18px; background: var(--slate2); border-bottom: 1px solid var(--border); }
    .table-head h3 { font-size: 13px; font-weight: 800; color: var(--text); display: flex; align-items: center; gap: 8px; }

    .badge { display: inline-flex; align-items: center; justify-content: center; min-width: 22px; height: 22px; padding: 0 8px; border-radius: 999px; font-size: 11px; font-weight: 800; }
    .badge.indigo { color: var(--indigo-dark); }
    .badge.teal { background: var(--teal-light); color: var(--teal-dark); }

    table { width: 100%; border-collapse: collapse; }
    thead tr { background: var(--slate2); border-bottom: 1.5px solid var(--border); }
    thead th { padding: 11px 12px; font-size: 11px; font-weight: 800; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; text-align: left; white-space: nowrap; }
    thead th.center { text-align: center; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .14s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--slate); }
    tbody td { padding: 12px 12px; font-size: 13px; color: var(--text2); vertical-align: middle; white-space: nowrap; }
    tbody td.center { text-align: center; }

    .cb { width: 16px; height: 16px; accent-color: var(--indigo); cursor: pointer; }

    .plat-badge { display: inline-flex; align-items: center; gap: 5px; padding: 0px 9px; border-radius: 999px; font-size: 11px; font-weight: 700; }
    .plat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .plat-nv .plat-dot { background: var(--plat-nv-dot); }
    .plat-nv { background: var(--plat-nv-bg); color: var(--plat-nv-text); }
    .plat-kk .plat-dot { background: var(--plat-kk-dot); }
    .plat-kk { background: var(--plat-kk-bg); color: var(--plat-kk-text); }
    .plat-gm .plat-dot { background: var(--plat-gm-dot); }
    .plat-gm { background: var(--plat-gm-bg); color: var(--plat-gm-text); }
    .plat-ig .plat-dot { background: var(--plat-ig-dot); }
    .plat-ig { background: var(--plat-ig-bg); color: var(--plat-ig-text); }
    .plat-fb .plat-dot { background: var(--plat-fb-dot); }
    .plat-fb { background: var(--plat-fb-bg); color: var(--plat-fb-text); }

    .stag { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 800; white-space: nowrap; }
    .stag.unresolved { background: var(--red-light); color: var(--red-dark); }
    .stag.checked { background: var(--blue-light); color: var(--blue-dark); }
    .stag.unchecked { background: var(--yellow-light); color: var(--yellow-dark); }
    .stag.generated { background: var(--indigo-light); color: var(--indigo-dark); }
    .stag.completed { background: var(--green-light); color: var(--green-dark); }
    .stag.sending { background: var(--orange-light); color: var(--orange-dark); }

    .review-cell { max-width: 800px; color: var(--text); line-height: 1.65; word-break: keep-all; white-space: pre-wrap; }
    .reply-full { min-width: 270px; max-width: 420px; white-space: pre-wrap; line-height: 1.65; color: var(--teal-dark); font-size: 12px; word-break: keep-all; }
    .reply-empty { font-size: 12px; color: var(--text3); font-style: italic; }

    .reply-edit { display: none; width: 100%; min-height: 82px; background: var(--slate); border: 1.5px solid var(--teal); border-radius: var(--radius-xs); padding: 8px 10px; font-size: 12px; color: var(--text); line-height: 1.65; font-family: 'Noto Sans KR', sans-serif; resize: vertical; outline: none; }
    .reply-edit:focus { box-shadow: 0 0 0 3px var(--teal-alpha-10); }
    
    .origin-link { color: inherit; text-decoration: none; }
    .origin-link:hover { text-decoration: underline; }

    .btn-row-ai, .btn-row-regen, .btn-row-send, .btn-row-copy { display: inline-flex; align-items: center; gap: 5px; padding: 6px 10px; border-radius: var(--radius-xs); font-size: 11px; font-weight: 800; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; transition: all .16s; white-space: nowrap; }
    .btn-row-ai, .btn-row-regen { border: 1.5px solid var(--indigo); background: var(--indigo-light); color: var(--indigo-dark); }
    .btn-row-ai:hover, .btn-row-regen:hover { background: var(--indigo); color: var(--white); }
    .btn-row-send { border: none; background: linear-gradient(135deg, var(--teal-dark), var(--green-dark)); color: var(--white); box-shadow: 0 2px 8px var(--teal-alpha-24); }
    .btn-row-send:hover, .btn-row-copy:hover { transform: translateY(-1px); }
    .btn-row-copy { border: none; background: linear-gradient(135deg, var(--slate-600), var(--slate-700)); color: var(--white); box-shadow: 0 2px 8px var(--slate-700-alpha-20); }
    .btn-row-ai:disabled, .btn-row-regen:disabled, .btn-row-send:disabled, .btn-row-copy:disabled { opacity: .42; cursor: not-allowed; transform: none; }

    .spin { width: 11px; height: 11px; border: 2px solid var(--indigo-alpha-26); border-top-color: currentColor; border-radius: 50%; display: none; animation: rot .7s linear infinite; }
    @keyframes rot { to { transform: rotate(360deg) } }

    .my-reply-row td { background: linear-gradient(135deg, var(--reply-bg-start), var(--reply-bg-end)); border-top: 1px dashed var(--teal-300); }
    .my-reply-box { display: flex; gap: 12px; align-items: flex-start; }
    .my-reply-label { flex-shrink: 0; padding: 4px 10px; border-radius: 999px; background: var(--teal-dark); color: var(--white); font-size: 11px; font-weight: 800; margin-top: 2px; }
    .my-reply-text { white-space: pre-wrap; line-height: 1.7; color: var(--text); font-size: 13px; word-break: keep-all; }

    .empty { text-align: center; padding: 46px 20px; color: var(--text3); font-size: 13px; }
    .empty span { display: block; font-size: 30px; margin-bottom: 10px; }

    .toast { position: fixed; right: 28px; bottom: 28px; z-index: 9999; background: var(--text); color: var(--white); padding: 12px 18px; border-radius: 10px; font-size: 13px; font-weight: 600; box-shadow: var(--shadow-lg); transform: translateY(70px); opacity: 0; transition: all .28s; pointer-events: none; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: var(--teal-dark); }
    .toast.error { background: var(--red); }

    @media(max-width:960px) {
      .page { padding: 16px 14px 60px; }
      header { padding: 0 14px; }
      .search-box input { width: 160px; }
      .review-cell, .reply-full { max-width: 220px; min-width: auto; }
      thead th, tbody td { padding: 9px 9px; }
    }
    
    .pagination-wrapper { display: flex; justify-content: center; align-items: center; gap: 8px; padding: 20px 0; background: var(--white); border-top: 1px solid var(--border); }
    .page-btn { min-width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: var(--radius-xs); border: 1px solid var(--border); background: var(--white); color: var(--text2); font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: 'Noto Sans KR', sans-serif; }
    .page-btn:hover:not(:disabled) { background: var(--slate2); border-color: var(--border2); }
    .page-btn.active { background: var(--indigo-light); border-color: var(--indigo-200); color: var(--indigo-dark); }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; background: var(--slate); }
  </style>
</head>

<body>

<div th:replace="~{fragments/header :: global-header(currentMenu='feedback')}"></div>


  <header>

  </header>

  <div class="page">
    <div class="hero">
      <div>
        <h1>리뷰와 댓글을 <em>호버 필터</em>로 분류하고 AI 답변을 관리하세요</h1>
        <p>리뷰 목록과 답글 자동화 안에서 전체/세부 플랫폼 기준으로 나눠서 바로 볼 수 있는 구조입니다.</p>
      </div>
      <div class="hero-kpis">
        <div class="kpi">
          <div class="kpi-n teal" id="kpiTotal">0</div>
          <div class="kpi-l">전체 항목</div>
        </div>
        <div class="kpi">
          <div class="kpi-n red" id="kpiNeed">0</div>
          <div class="kpi-l">답변 필요</div>
        </div>
        <div class="kpi">
          <div class="kpi-n indigo" id="kpiReady">0</div>
          <div class="kpi-l">답변 완료</div>
        </div>
        <div class="kpi">
          <div class="kpi-n green" id="kpiCompleted">0</div>
          <div class="kpi-l">전송 완료</div>
        </div>
      </div>
    </div>

    <div class="sent-banner" id="sentBanner">
      <strong>✅ 전송이 완료되었습니다.</strong>
      <p id="sentBannerDesc"></p>
    </div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-top">
        <span>✦ AI 답변 생성 중... <span id="progressLabel">0 / 0</span></span>
        <span id="progressPct" style="font-size:11px;color:var(--text3);">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <div class="toolbar">
      <div class="toolbar-left">
        <div class="filter-menu">
          <div class="filter-dropdown">
            <button class="filter-trigger" id="filter-review">
              리뷰 목록 <span>▾</span>
            </button>
            <div class="filter-panel">
              <div class="filter-panel-title">리뷰 목록</div>
              <button class="filter-option" id="opt-review_all" onclick="setFilter('review_group','review_all')">리뷰 전체</button>
              <button class="filter-option" id="opt-naver_review" onclick="setFilter('review_group','naver_review')">네이버 지도 리뷰</button>
              <button class="filter-option" id="opt-kakao_review" onclick="setFilter('review_group','kakao_review')">카카오맵 리뷰</button>
              <button class="filter-option" id="opt-google_review" onclick="setFilter('review_group','google_review')">구글 리뷰</button>
            </div>
          </div>

          <div class="filter-dropdown">
            <button class="filter-trigger" id="filter-comment">
              답글 자동화 <span>▾</span>
            </button>
            <div class="filter-panel">
              <div class="filter-panel-title">답글 자동화</div>
              <button class="filter-option" id="opt-comment_all" onclick="setFilter('comment_group','comment_all')">댓글 전체</button>
              <button class="filter-option" id="opt-instagram_comment" onclick="setFilter('comment_group','instagram_comment')">인스타그램 댓글</button>
              <button class="filter-option" id="opt-facebook_comment" onclick="setFilter('comment_group','facebook_comment')">페이스북 댓글</button>
            </div>
          </div>

          <div class="filter-dropdown">
            <button class="filter-trigger" id="filter-status">
              처리 상태 <span>▾</span>
            </button>
            <div class="filter-panel">
              <div class="filter-panel-title">처리 상태</div>
              <button class="filter-option"  onclick="setFilter('status_group','')">전체</button>
              <button class="filter-option" id="opt-done" onclick="setFilter('status_group','answer_done')">답변 완료</button>
              <button class="filter-option" id="opt-need" onclick="setFilter('status_group','answer_needed')">답변 필요</button>
            </div>
          </div>

          <div class="filter-dropdown">
            <button class="filter-trigger active" id="filter-all" onclick="resetFilters()">
              전체 <span></span>
            </button>
          </div>
        </div>

        <div class="search-box">
          <span style="font-size:13px;color:var(--text3);">🔍</span>
          <input id="searchInput" placeholder="검색어를 입력 후 엔터를 누르세요..." onkeydown="if(event.key==='Enter') applyFilter()">
        </div>
      </div>

      <div class="toolbar-right">
        <button class="btn-sync" onclick="syncAllSocialData()" id="btnSync" type="button">
          <span class="spin" id="spinSync" style="display:none;"></span>
          🔄 최신 데이터 불러오기
        </button>
        <button class="btn-main" id="btnAIAll" onclick="generateAllAI()">
          <span class="spin" id="spinAll"></span>
          ✦ 선택 항목 AI 답변 생성
        </button>
        <button class="btn-send" id="btnSendAll" onclick="sendAllComments()">
          📤 댓글 전체 전송
        </button>
      </div>
    </div>

    <div class="table-wrap">
      <div class="table-head">
        <h3>
          수집된 리뷰 / 댓글
          <span class="badge indigo" id="countBadge">0</span>
          <span class="badge indigo"  id="selectBadge">0개 선택</span>
        </h3>
        <label style="font-size:12px;color:var(--text2);display:flex;align-items:center;gap:6px;cursor:pointer;">
          <input type="checkbox" id="selectAll" class="cb" onchange="toggleSelectAll(this)"> 전체 선택
        </label>
      </div>

      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th class="center" style="width:36px;"></th>
              <th style="text-align: center;">고객명</th>
              <th style="text-align: center;">플랫폼</th>
              <th>유형</th>
              <th>원문</th>
              <th>AI 생성 답변</th>
              <th class="center">상태</th>
              <th class="center">AI 생성</th>
              <th class="center">복사/전송</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
        <div id="paginationContainer" class="pagination-wrapper"></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // --- 변수 선언부 ---
    let items = []; // 현재 페이지 데이터 배열
    let selectedIds = new Set();
    
    let activeSourceGroup = 'all'; 
    let activeSourceValue = '';
    let activeStatusValue = '';  

    let currentPage = 1;
    const itemsPerPage = 10;
    let totalPages = 1;
    let totalElements = 0;

    // --- 유틸리티 및 KPI 함수 ---
    async function updateKPIs(kpiData) {
      if (!kpiData) {
        try {
          const res = await fetch('/api/feedbacks/kpi');
          if (res.ok) kpiData = await res.json();
        } catch(e) { return; }
      }
      if (kpiData) {
        if(document.getElementById('kpiTotal')) document.getElementById('kpiTotal').textContent = kpiData.total || 0;
        if(document.getElementById('kpiNeed')) document.getElementById('kpiNeed').textContent = kpiData.need || 0;
        if(document.getElementById('kpiReady')) document.getElementById('kpiReady').textContent = kpiData.ready || 0;
        if(document.getElementById('kpiCompleted')) document.getElementById('kpiCompleted').textContent = kpiData.completed || 0;
      }
    }

    function showToast(msg, type = '') {
      const toast = document.getElementById('toast');
      if(!toast) return;
      toast.textContent = type === 'success' ? `✅ ${msg}` : type === 'error' ? `❌ ${msg}` : msg;
      toast.className = `toast show ${type}`;
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // --- 선택 처리 로직 (누락되었던 핵심 부분) ---
    function updateSelectCount() {
      const badge = document.getElementById('selectBadge');
      if (badge) badge.textContent = `${selectedIds.size}개 선택`;
    }

    function updateSelectAllCheckbox() {
      const eligible = items.filter(it => it.status !== 'completed');
      const selectAllCb = document.getElementById('selectAll');
      if(selectAllCb) selectAllCb.checked = eligible.length > 0 && eligible.every(it => selectedIds.has(it.id));
    }

    function toggleSelect(id, cb) {
      if (cb.checked) {
        selectedIds.add(id);
      } else {
        selectedIds.delete(id);
      }
      updateSelectCount();
      updateSelectAllCheckbox();
    }

    function toggleSelectAll(cb) {
      items.forEach(it => {
        if (it.status !== 'completed') {
          cb.checked ? selectedIds.add(it.id) : selectedIds.delete(it.id);
        }
      });
      renderTable(); 
    }

    // --- 데이터 패치 및 필터 로직 ---
    async function fetchFeedbackData() {
      try {
        const params = new URLSearchParams({
          page: currentPage - 1,
          size: itemsPerPage,
          sourceGroup: activeSourceGroup === 'all' ? '' : activeSourceGroup,
          sourceValue: activeSourceValue || '',
          statusValue: activeStatusValue || '',
          keyword: document.getElementById('searchInput')?.value.trim() || ''
        });

        const [listRes, kpiRes] = await Promise.all([
          fetch(`/api/feedbacks?${params.toString()}`),
          fetch('/api/feedbacks/kpi')
        ]);

        if (!listRes.ok || !kpiRes.ok) throw new Error('데이터 로드 실패');
        
        const pageData = await listRes.json();
        const kpiData = await kpiRes.json();

        items = pageData.content;
        totalPages = pageData.totalPages;
        totalElements = pageData.totalElements;
        
        updateKPIs(kpiData);
        renderTable();
      } catch (error) {
        console.error(error);
        showToast('DB에서 데이터를 불러오는데 실패했습니다.', 'error');
      }
    }
    
 // --- 필터 UI 및 동작 로직 ---
    function updateFilterUI() {
      document.querySelectorAll('.filter-trigger, .filter-option').forEach(el => el.classList.remove('active'));
      
      const reviewBtn = document.getElementById('filter-review');
      const commentBtn = document.getElementById('filter-comment');
      const statusBtn = document.getElementById('filter-status');
      const allBtn = document.getElementById('filter-all');

      if (reviewBtn) reviewBtn.innerHTML = '리뷰 목록 <span>▾</span>';
      if (commentBtn) commentBtn.innerHTML = '답글 자동화 <span>▾</span>';
      if (statusBtn) statusBtn.innerHTML = '처리 상태 <span>▾</span>';

      const optionIdMap = {
        review_all: 'opt-review_all', naver_review: 'opt-naver_review', kakao_review: 'opt-kakao_review',
        google_review: 'opt-google_review', comment_all: 'opt-comment_all', instagram_comment: 'opt-instagram_comment',
        facebook_comment: 'opt-facebook_comment', answer_done: 'opt-done', answer_needed: 'opt-need'
      };

      let isAll = true;

      // 리뷰 필터 상태 복구
      if (activeSourceGroup === 'review_group') {
        isAll = false;
        if (reviewBtn) reviewBtn.classList.add('active');
        const optEl = document.getElementById(optionIdMap[activeSourceValue]);
        if (optEl && reviewBtn) {
          optEl.classList.add('active');
          reviewBtn.innerHTML = `${optEl.textContent} <span>▾</span>`;
        }
      } 
      // 댓글 필터 상태 복구
      else if (activeSourceGroup === 'comment_group') {
        isAll = false;
        if (commentBtn) commentBtn.classList.add('active');
        const optEl = document.getElementById(optionIdMap[activeSourceValue]);
        if (optEl && commentBtn) {
          optEl.classList.add('active');
          commentBtn.innerHTML = `${optEl.textContent} <span>▾</span>`;
        }
      }

      // 처리 상태 필터 복구 (독립 실행)
      if (activeStatusValue) {
        isAll = false;
        if (statusBtn) statusBtn.classList.add('active');
        const optEl = document.getElementById(optionIdMap[activeStatusValue]);
        if (optEl && statusBtn) {
          optEl.classList.add('active');
          statusBtn.innerHTML = `${optEl.textContent} <span>▾</span>`;
        }
      }

      if (isAll && allBtn) {
        allBtn.classList.add('active');
      }
    }

    function setFilter(group, value) {
      if (group === 'status_group') {
        activeStatusValue = value; // 상태 값만 변경
      } else {
        activeSourceGroup = group; // 소스(리뷰/댓글) 값만 변경
        activeSourceValue = value;
      }
      
      updateFilterUI();
      applyFilter();
    }

    function resetFilters() {
      activeSourceGroup = 'all';
      activeSourceValue = '';
      activeStatusValue = '';
      
      updateFilterUI();
      applyFilter();
    }

    function applyFilter() {
      currentPage = 1;
      selectedIds.clear(); // 필터 조건 변경 시 선택 내역 초기화
      fetchFeedbackData();
    }

    // --- UI 상태 표기용 유틸리티 ---
    function getDisplayStatus(item) {
      if (item.status === 'completed') return 'completed';
      if (item.aiStatus === 'done' && item.aiReply && item.aiReply.trim()) return 'generated';
      if (item.status === 'checked') return 'checked';
      if (item.status === 'unchecked') return 'unchecked';
      return 'unresolved';
    }

    function getStatusLabel(status) {
      const labels = {
        unresolved: '미답변', checked: '확인', unchecked: '미확인',
        generated: 'AI 답변 생성됨', completed: '전송 완료', sending: '전송중'
      };
      return labels[status] || status;
    }

    function platHtml(item) {
      return `<span class="plat-badge ${item.platClass}"><span class="plat-dot"></span>${item.platformLabel}</span>`;
    }

    function typeLabel(item) {
      if (item.type === 'review') return `<span style="font-size:11px;font-weight:800;color:var(--text2);background:var(--slate2);border:1px solid var(--border);padding:0px 9px;border-radius:999px;margin-left:-10px;">리뷰</span>`;
      return `<span style="font-size:11px;font-weight:800;color:var(--indigo-dark);background:var(--indigo-light);border:1px solid #C7D2FE;padding:0px 9px;border-radius:999px;margin-left:-10px;">댓글</span>`;
    }

    // --- 렌더링 함수 ---
    function renderTable() {
      const tbody = document.getElementById('tbody');
      document.getElementById('countBadge').textContent = totalElements;
      updateSelectCount(); 
      
      if (!items.length) {
        tbody.innerHTML = `<tr><td colspan="10"><div class="empty"><span>🔎</span>조건에 맞는 항목이 없습니다.</div></td></tr>`;
        renderPagination();
        updateSelectAllCheckbox();
        return;
      }
      
      let html = '';
      items.forEach(it => {
        const displayStatus = getDisplayStatus(it);
        const hasReply = !!(it.aiReply && it.aiReply.trim());
        const isSent = it.status === 'completed';
        const isSending = it.status === 'sending';

        html += `
        <tr style="${isSent ? 'opacity:.82;' : ''}">
          <td class="center">
            <input type="checkbox" class="cb" ${selectedIds.has(it.id) ? 'checked' : ''} onchange="toggleSelect(${it.id}, this)" ${isSent ? 'disabled' : ''}>
          </td>
          <td>
            <span style="font-weight:700;color:var(--text);font-size:13px;display:block;width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">
              ${it.name || '알 수 없음'}
            </span>
          </td>
          <td style="text-align: center;">${platHtml(it)}</td>
          <td>${typeLabel(it)}</td>
          <td>
            <div class="review-cell"><a href="${it.originUrl}" target="_blank" class="origin-link">${it.text || ''}</a></div>
          </td>
          <td>
            <div id="replyDisp-${it.id}" class="${hasReply ? 'reply-full' : 'reply-empty'}">${hasReply ? it.aiReply : '아직 생성된 AI 답변이 없습니다.'}</div>
          </td>
          <td class="center">
            ${isSending ? `<span class="stag sending">전송중</span>` : `<span class="stag ${displayStatus}">${getStatusLabel(displayStatus)}</span>`}
          </td>
          <td class="center">
            <button class="btn-row-ai" id="rowAiBtn-${it.id}" onclick="generateSingleAI(${it.id})" ${isSent ? 'disabled' : ''}>
              <span class="spin" id="rowSpin-${it.id}"></span>${hasReply ? 'AI 재생성' : 'AI 생성'}
            </button>
          </td>
          <td class="center">
            ${it.type === 'review' ? (hasReply ? `<button class="btn-row-copy" onclick="copyReply(${it.id})">📋 복사</button>` : `<span style="font-size:11px;color:var(--text3);">—</span>`) : 
              it.type === 'comment' ? (isSent ? `<span class="stag completed">전송 완료</span>` : hasReply ? `<button class="btn-row-send" id="sendBtn-${it.id}" onclick="sendSingle(${it.id})"><span class="spin" id="sendSpin-${it.id}"></span>전송</button>` : `<span style="font-size:11px;color:var(--text3);">—</span>`) : 
              `<span style="font-size:11px;color:var(--text3);">—</span>`}
          </td>
        </tr>`;

        if (isSent && it.sentReply) {
          html += `
          <tr class="my-reply-row">
            <td></td>
            <td colspan="9">
              <div class="my-reply-box">
                <div class="my-reply-label">내 답글</div>
                <div class="my-reply-text">${it.sentReply}</div>
              </div>
            </td>
          </tr>`;
        }
      });
      
      tbody.innerHTML = html;
      updateSelectAllCheckbox();
      renderPagination();
    }

    function renderPagination() {
      const container = document.getElementById('paginationContainer');
      if (!container) return; 

      let pageHtml = '';
      if (totalPages <= 1) {
        container.innerHTML = ''; 
        return;
      }

      pageHtml += `<button class="page-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>&laquo;</button>`;
      for (let i = 1; i <= totalPages; i++) {
        pageHtml += `<button class="page-btn ${currentPage === i ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
      }
      pageHtml += `<button class="page-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>&raquo;</button>`;

      container.innerHTML = pageHtml;
    }

    function changePage(page) {
      if (page < 1 || page > totalPages) return;
      currentPage = page;
      fetchFeedbackData(); // 서버사이드 페이지 이동
    }

    // --- API 액션 로직 ---
    async function generateSingleAI(id) {
      const item = items.find(v => v.id === id);
      if (!item) return;

      const btn = document.getElementById(`rowAiBtn-${id}`);
      const spin = document.getElementById(`rowSpin-${id}`);
      if (btn) btn.disabled = true;
      if (spin) spin.style.display = 'inline-block';
      
      try {
        const response = await fetch(`/api/feedbacks/${id}/ai-reply`, { method: 'PUT' });
        if (!response.ok) throw new Error('API 호출 실패');
        
        Object.assign(item, await response.json());
        showToast(`${item.name}님 AI 답변 생성 완료`, 'success');
      } catch (e) {
        console.error(e);
        showToast('AI 생성 중 오류가 발생했습니다.', 'error');
      } finally {
        if (btn) btn.disabled = false;
        if (spin) spin.style.display = 'none';
        renderTable();
        updateKPIs(); // 갱신된 KPI 불러오기
      }
    }

    async function generateAllAI() {
      const targets = items.filter(it => selectedIds.has(it.id) && it.status !== 'completed');
      if (!targets.length) return showToast('AI 생성할 항목을 선택해 주세요.', 'error');

      const btn = document.getElementById('btnAIAll');
      const spin = document.getElementById('spinAll');
      const wrap = document.getElementById('progressWrap');
      const fill = document.getElementById('progressFill');
      const lbl = document.getElementById('progressLabel');
      const pct = document.getElementById('progressPct');

      if(btn) btn.disabled = true;
      if(spin) spin.style.display = 'inline-block';
      if(wrap) wrap.classList.add('visible');
      
      let done = 0;
      for (const item of targets) {
        try {
          const response = await fetch(`/api/feedbacks/${item.id}/ai-reply`, { method: 'PUT' });
          if (response.ok) Object.assign(item, await response.json());
        } catch (e) {
          console.error(`ID ${item.id} 생성 실패`, e);
        }
        
        done++;
        const progress = Math.round((done / targets.length) * 100);
        if(fill) fill.style.width = progress + '%';
        if(lbl) lbl.textContent = `${done} / ${targets.length}`;
        if(pct) pct.textContent = progress + '%';
        
        renderTable(); 
      }
      
      updateKPIs(); // 모두 끝난 뒤 KPI 갱신
      if(btn) btn.disabled = false;
      if(spin) spin.style.display = 'none';
      if(wrap) setTimeout(() => wrap.classList.remove('visible'), 1200);
      showToast(`AI 답변 ${done}건 생성 완료`, 'success');
    }

    async function copyReply(id) {
      const item = items.find(v => v.id === id);
      if (!item || !item.aiReply?.trim()) return showToast('복사할 답변이 없습니다.', 'error');
      try {
        await navigator.clipboard.writeText(item.aiReply);
        showToast(`${item.name}님의 AI 답변을 복사했습니다.`, 'success');
      } catch (e) {
        showToast('복사에 실패했습니다.', 'error');
      }
    }

    async function sendSingle(id) {
      const item = items.find(v => v.id === id);
      if (!item || item.type !== 'comment' || !item.aiReply?.trim()) return showToast('전송할 댓글 답변이 없습니다.', 'error');
      
      const btn = document.getElementById(`sendBtn-${id}`);
      const spin = document.getElementById(`sendSpin-${id}`);
      if (btn) btn.disabled = true;
      if (spin) spin.style.display = 'inline-block';
      
      const originalStatus = item.status;
      item.status = 'sending';
      renderTable();
      
      try {
        const response = await fetch(`/api/feedbacks/${id}/send`, { method: 'PUT' });
        if (!response.ok) throw new Error((await response.json()).message || '서버 에러');
        
        Object.assign(item, await response.json());
        
        document.getElementById('sentBannerDesc').textContent = `${item.name}님의 댓글 답변이 전송되었습니다.`;
        document.getElementById('sentBanner')?.classList.add('show');
        showToast(`${item.name}님 답변 전송 완료`, 'success');
      } catch (e) {
        console.error(e);
        showToast('전송 중 오류가 발생했습니다.', 'error');
        item.status = originalStatus;
      } finally {
        if (btn) btn.disabled = false;
        if (spin) spin.style.display = 'none';
        renderTable();
        updateKPIs();
      }
    }

    async function sendAllComments() {
      const toSend = items.filter(v => v.type === 'comment' && v.aiStatus === 'done' && v.status !== 'completed' && v.aiReply?.trim() && selectedIds.has(v.id));
      if (!toSend.length) return showToast('전송할 댓글 답변이 없습니다. (체크박스를 확인하세요)', 'error');

      toSend.forEach(v => v.status = 'sending');
      renderTable();
      
      let successCount = 0;
      for (const item of toSend) {
        try {
          const response = await fetch(`/api/feedbacks/${item.id}/send`, { method: 'PUT' });
          if (response.ok) {
            Object.assign(item, await response.json());
            successCount++;
          } else {
            item.status = 'unresolved'; 
          }
        } catch (e) {
          console.error(`ID ${item.id} 전송 실패`, e);
          item.status = 'unresolved';
        }
      }

      renderTable();
      updateKPIs();

      if (successCount > 0) {
        document.getElementById('sentBannerDesc').textContent = `총 ${successCount}건의 답변이 전송되었습니다.`;
        document.getElementById('sentBanner')?.classList.add('show');
        showToast(`${successCount}건 전송 완료`, 'success');
      } else {
        showToast('전송에 성공한 댓글이 없습니다.', 'error');
      }
    }

    async function syncAllSocialData() {
      const btn = document.getElementById('btnSync');
      const spin = document.getElementById('spinSync');
      
      if(btn) btn.disabled = true;
      if(spin) spin.style.display = 'inline-block';
      showToast('소셜 데이터를 동기화하는 중입니다... (최대 1~2분 소요)', '');

      let totalNewCount = 0;

      try {
        try {
          const instaRes = await fetch('/api/feedbacks/instagram/sync-comments', { method: 'POST' });
          if (instaRes.ok) {
            const instaData = await instaRes.json();
            totalNewCount += (instaData.newCount || 0);
          }
        } catch (e) {}

        try {
          const fbRes = await fetch('/api/feedbacks/facebook/sync-comments', { method: 'POST' });
          if (fbRes.ok) {
            const fbData = await fbRes.json();
            totalNewCount += (fbData.newCount || 0);
          }
        } catch (e) {}

        if (totalNewCount > 0) {
          showToast(`총 ${totalNewCount}개의 새로운 댓글을 가져왔습니다!`, 'success');
        } else {
          showToast('새로 추가된 댓글이 없습니다.', 'success');
        }

        // 전체 동기화가 끝나면 무조건 첫 페이지로 돌아가서 데이터 리프레시
        currentPage = 1;
        await fetchFeedbackData(); 

      } catch (error) {
        console.error('전체 동기화 중 에러 발생:', error);
        showToast('데이터 동기화 중 오류가 발생했습니다.', 'error');
      } finally {
        if(btn) btn.disabled = false;
        if(spin) spin.style.display = 'none';
      }
    }

    // --- 초기 실행 ---
    fetchFeedbackData();
  </script>
