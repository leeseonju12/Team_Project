  <script>
    /* ── 모달 제어 ── */
    function openAiModal() {
      const modal = document.getElementById('aiInputModal');
      modal.style.display = 'flex';
    }

    function closeAiModal() {
      document.getElementById('aiInputModal').style.display = 'none';
    }

    /* 모달 바깥 클릭 시 닫기 */
    document.getElementById('aiInputModal').addEventListener('click', function(e) {
      if (e.target === this) closeAiModal();
    });

    /* ── 입력값 수집 및 점수 정규화 ── */
    function collectAndNormalize() {
      const getRadio = (name) => {
        const el = document.querySelector(`input[name="${name}"]:checked`);
        return el ? el.value : 'mid';
      };
      const feelScore = { good: 85, mid: 50, bad: 20 };
      const freqScore = { high: 100, mid: 60, low: 20 };

      // 인스타그램
      const igFollowers = parseFloat(document.getElementById('ig_followers').value) || 0;
      const igLikes     = parseFloat(document.getElementById('ig_likes').value) || 0;
      const igFeel      = feelScore[getRadio('ig_feel')];
      const igFreq      = freqScore[getRadio('ig_freq')];
      const igNumScore  = igFollowers > 0
        ? Math.min(100, (igFollowers / 500) * 30 + (igLikes / 50) * 30)
        : 0;
      const igScore = igNumScore > 0
        ? igNumScore * 0.6 + igFeel * 0.25 + igFreq * 0.15
        : igFeel * 0.6 + igFreq * 0.4;

      // 페이스북
      const fbReach     = parseFloat(document.getElementById('fb_reach').value) || 0;
      const fbReactions = parseFloat(document.getElementById('fb_reactions').value) || 0;
      const fbFeel      = feelScore[getRadio('fb_feel')];
      const fbFreq      = freqScore[getRadio('fb_freq')];
      const fbNumScore  = fbReach > 0
        ? Math.min(100, (fbReach / 200) * 30 + (fbReactions / 20) * 30)
        : 0;
      const fbScore = fbNumScore > 0
        ? fbNumScore * 0.6 + fbFeel * 0.25 + fbFreq * 0.15
        : fbFeel * 0.6 + fbFreq * 0.4;

      // 네이버 블로그
      const nvVisitors = parseFloat(document.getElementById('nv_visitors').value) || 0;
      const nvFeel     = feelScore[getRadio('nv_feel')];
      const nvFreq     = freqScore[getRadio('nv_freq')];
      const nvNumScore = nvVisitors > 0
        ? Math.min(100, (nvVisitors / 100) * 60)
        : 0;
      const nvScore = nvNumScore > 0
        ? nvNumScore * 0.6 + nvFeel * 0.25 + nvFreq * 0.15
        : nvFeel * 0.6 + nvFreq * 0.4;

      // 카카오 채널
      const kkFriends  = parseFloat(document.getElementById('kk_friends').value) || 0;
      const kkOpenrate = parseFloat(document.getElementById('kk_openrate').value) || 0;
      const kkFeel     = feelScore[getRadio('kk_feel')];
      const kkFreq     = freqScore[getRadio('kk_freq')];
      const kkNumScore = kkFriends > 0
        ? Math.min(100, (kkFriends / 500) * 40 + (kkOpenrate / 30) * 20)
        : 0;
      const kkScore = kkNumScore > 0
        ? kkNumScore * 0.6 + kkFeel * 0.25 + kkFreq * 0.15
        : kkFeel * 0.6 + kkFreq * 0.4;

      return [
        { id: 'instagram', name: 'Instagram',   color: '#E1306C', score: Math.round(igScore),
          meta: { followers: igFollowers, likes: igLikes } },
        { id: 'facebook',  name: 'Facebook',    color: '#1877F2', score: Math.round(fbScore),
          meta: { reach: fbReach, reactions: fbReactions } },
        { id: 'naver',     name: '네이버 블로그', color: '#03C75A', score: Math.round(nvScore),
          meta: { visitors: nvVisitors } },
        { id: 'kakao',     name: '카카오 채널',  color: '#F9C000', score: Math.round(kkScore),
          meta: { friends: kkFriends, openrate: kkOpenrate } },
      ];
    }

    /* ── Gemini API 호출 ── */
    async function callGeminiStrategy(channels) {
      const top3 = [...channels].sort((a, b) => b.score - a.score).slice(0, 3);

      const channelDesc = channels.map(c => {
        const lines = [`- ${c.name}: ${c.score}점`];
        if (c.id === 'instagram' && c.meta.followers > 0)
          lines.push(`  (팔로워 ${c.meta.followers.toLocaleString()}, 평균 좋아요 ${c.meta.likes})`);
        if (c.id === 'facebook' && c.meta.reach > 0)
          lines.push(`  (평균 도달 ${c.meta.reach.toLocaleString()}, 평균 반응 ${c.meta.reactions})`);
        if (c.id === 'naver' && c.meta.visitors > 0)
          lines.push(`  (일 평균 방문자 ${c.meta.visitors}명)`);
        if (c.id === 'kakao' && c.meta.friends > 0)
          lines.push(`  (친구 수 ${c.meta.friends.toLocaleString()}, 오픈율 ${c.meta.openrate}%)`);
        return lines.join('\n');
      }).join('\n');

      const prompt = `당신은 한국 소상공인 SNS 마케팅 전문가입니다.
아래는 사장님이 직접 입력한 채널별 성과 점수(0~100점)입니다.

${channelDesc}

위 데이터를 기반으로 다음 JSON 형식으로만 응답하세요. 다른 텍스트나 마크다운은 절대 포함하지 마세요.

{
  "recommendations": [
    {
      "title": "핵심 채널",
      "channel": "채널명",
      "time": "최적 포스팅 시간대",
      "type": "추천 콘텐츠 유형",
      "detail": "2~3문장 구체적 운영 전략"
    },
    {
      "title": "확장 운영",
      "channel": "채널명",
      "time": "최적 포스팅 시간대",
      "type": "추천 콘텐츠 유형",
      "detail": "2~3문장 구체적 운영 전략"
    },
    {
      "title": "보완 전략",
      "channel": "채널명",
      "time": "최적 포스팅 시간대",
      "type": "추천 콘텐츠 유형",
      "detail": "2~3문장 구체적 운영 전략"
    }
  ],
  "summary": "전체 채널 운영에 대한 종합 인사이트 2~3문장"
}

조건:
- recommendations 순서는 점수 높은 순 상위 3개 채널
- time은 한국 소상공인 타겟 기준 구체적 시간대 (예: 오전 10~11시, 저녁 7~9시)
- detail은 해당 채널의 특성과 점수를 반영한 실질적인 조언
- 모든 텍스트는 한국어로 작성`;

//수정
const csrfToken = document.cookie.split('; ')
    .find(r => r.startsWith('XSRF-TOKEN='))
    ?.split('=')[1];

const res = await fetch('/api/gemini/strategy', {
    method: 'POST',
    headers: {
        'Content-Type': 'application/json',
        'X-XSRF-TOKEN': csrfToken
    },
    body: JSON.stringify({ prompt })
});

      if (!res.ok) throw new Error(`서버 오류: ${res.status}`);
      const data = await res.json();

      // 응답 텍스트에서 JSON 추출
      let raw = data.result || '';
      raw = raw.replace(/```json|```/g, '').trim();
      return JSON.parse(raw);
    }

    /* ── 분석 실행 ── */
    async function submitAndGenerate() {
      closeAiModal();

      const btn = document.getElementById('aiGenBtn');
      btn.classList.add('loading');
      btn.querySelector('.btn-text').textContent = '분석 중...';
      document.getElementById('aiEmpty').style.display = 'none';
      document.getElementById('aiResult').style.display = 'none';
      document.getElementById('aiCards').innerHTML = '';
      document.getElementById('aiSummaryText').textContent = '';
      document.getElementById('aiSummaryText').classList.remove('typing-cursor');

      try {
        const channels  = collectAndNormalize();
        const parsed    = await callGeminiStrategy(channels);

        document.getElementById('aiResult').style.display = 'block';
        document.getElementById('aiCards').innerHTML = parsed.recommendations.map((r, i) => `
          <div class="ai-rec-card">
            <div class="ai-rec-header">
              <div class="ai-rec-num">${i + 1}</div>
              <div class="ai-rec-title">${r.title}</div>
            </div>
            <div class="ai-rec-body">
              <strong>📢 채널:</strong> ${r.channel}<br>
              <strong>⏰ 시간:</strong> ${r.time}<br>
              <strong>📝 유형:</strong> ${r.type}<br><br>
              ${r.detail}
            </div>
          </div>
        `).join('');

        // 타이핑 효과
        const sumEl = document.getElementById('aiSummaryText');
        const txt   = parsed.summary;
        sumEl.classList.add('typing-cursor');
        let i = 0;
        const iv = setInterval(() => {
          sumEl.textContent = txt.slice(0, ++i);
          if (i >= txt.length) {
            clearInterval(iv);
            sumEl.classList.remove('typing-cursor');
          }
        }, 18);

     	// 수정
        if (typeof showToast === 'function') {
            showToast('전략 분석이 완료되었습니다!', 'success');
        }

      } catch (error) {
          document.getElementById('aiEmpty').style.display = 'flex';
          document.getElementById('aiResult').style.display = 'none';
          if (typeof showToast === 'function') {
              showToast('분석 중 오류가 발생했습니다. 다시 시도해 주세요.', '');
          }
          console.error(error);
        }

        btn.classList.remove('loading');
        btn.querySelector('.btn-text').textContent = '✦ 전략 분석 시작';
      }
  </script>

</th:block>
