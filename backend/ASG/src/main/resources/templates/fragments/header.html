<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
	<div th:fragment="global-header(currentMenu)">
    
    <style>
      /* =========================================
         1. Global Variables & Reset
         ========================================= */
      :root {
        --teal:#14B8A6; --teal-light:#CCFBF1; --teal-mid:#5EEAD4; --teal-dark:#0D9488;
        --slate:#F1F5F9; --slate2:#E2E8F0;
        --indigo:#6366F1; --indigo-light:#EEF2FF; --indigo-dark:#4F46E5;
        --text:#0F172A; --text2:#475569; --text3:#94A3B8;
        --white:#FFFFFF; --border:#E2E8F0; --border2:#CBD5E1;
        --radius:14px; --radius-sm:9px;
        --shadow-sm:0 1px 3px rgba(15,23,42,.07);
        --shadow:0 4px 16px rgba(15,23,42,.08),0 2px 6px rgba(15,23,42,.05);
      }
      
      *, *::before, *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
      }

      /* =========================================
         2. Header Layout
         ========================================= */
      .top-stripe {
        height: 4px;
        background: linear-gradient(90deg, var(--teal) 0%, var(--indigo) 60%, var(--teal-mid) 100%);
        margin-top: 0;
      }
      
      header {
        width: 100%;
        background: var(--white);
        border-bottom: 1px solid var(--border);
        box-shadow: var(--shadow-sm);
        flex-shrink: 0;
        position: sticky;
        top: 0;
        z-index: 200;
        display: flex;
        flex-direction: column;
      }

      .header-row1 {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 40px;
        height: 64px;
        flex-shrink: 0;
      }

      /* Rationale: Initially hide the second row on desktop view */
      .header-row2 {
        display: none;
        border-top: 1px solid var(--border);
        padding: 4px 8px;
        background: var(--white);
      }

      /* =========================================
         3. Logo & Nav Pills
         ========================================= */
      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
        color: inherit;
        flex-shrink: 0;
      }
      .logo-mark {
        width: 34px; height: 34px;
        border-radius: 9px;
        background: linear-gradient(135deg, var(--teal), var(--indigo));
        display: flex; align-items: center; justify-content: center;
        font-size: 16px; font-weight: 900; color: #fff;
        box-shadow: 0 2px 8px rgba(20, 184, 166, .35);
        flex-shrink: 0;
      }
      .logo-name { font-size: 15px; font-weight: 700; letter-spacing: -.3px; }
      .logo-sub { font-size: 11px; color: var(--text3); margin-left: 6px; }
      
      .nav-pills { display: flex; gap: 4px; }
      .nav-pill {
        padding: 6px 14px;
        border-radius: 100px;
        font-size: 12px; font-weight: 500;
        cursor: pointer;
        border: 1.5px solid transparent;
        color: var(--text2);
        background: transparent;
        transition: all .2s;
        font-family: 'Noto Sans KR', sans-serif;
        text-decoration: none;
        display: flex; align-items: center; gap: 5px;
      }
      .nav-pill:hover { background: var(--slate); color: var(--text); }
      .nav-pill.active {
        background: var(--indigo-light);
        border-color: #C7D2FE;
        color: var(--indigo-dark);
        font-weight: 600;
      }
      
      /* =========================================
         4. User Info
         ========================================= */
      .header-user { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
      .user-avatar {
        width: 34px; height: 34px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--teal), var(--indigo));
        display: flex; align-items: center; justify-content: center;
        font-size: 13px; font-weight: 800; color: #fff;
        cursor: pointer; flex-shrink: 0;
      }
      .user-name { font-size: 13px; font-weight: 600; color: var(--text2); }
      
      /* =========================================
         5. Mobile Responsive Configuration
         ========================================= */
      @media(max-width: 900px) {
        .header-row1 { padding: 0 16px; height: 56px; }
        
        /* Rationale: Toggle visibility between top and bottom nav containers */
        .header-row2 { display: flex; }
        .nav-pills-top { display: none; }
        
        .nav-pills-bottom { width: 100%; gap: 2px; }
        .nav-pills-bottom .nav-pill { flex: 1; justify-content: center; padding: 6px 4px; font-size: 11px; }
        .logo-sub { display: none; }
        .user-name { display: none; }
		
		/* mypage 용 */
		.hamburger {
		            display: flex;
		            flex-direction: column; justify-content: center; align-items: center; gap: 5px;
		            width: 38px; height: 38px;
		            border-radius: 9px; background: transparent;
		            border: 1.5px solid var(--border);
		            cursor: pointer; padding: 0; flex-shrink: 0;
		            transition: background .15s;
		        }
		        .hamburger:hover { background: var(--slate); }
		        .hamburger span { display: block; width: 18px; height: 2px; background: var(--text2); border-radius: 2px; }
		
		
      }
    </style>

    <div class="top-stripe"></div>
    <header>
      <div class="header-row1">
        <a th:href="@{/}" class="logo">
          <div class="logo-mark">S</div>
          <span class="logo-name">소셜다모아</span>
          <span class="logo-sub">All Social Gather</span>
        </a>
        <nav class="nav-pills nav-pills-top">
          <a th:href="@{/content/generate}" class="nav-pill" th:classappend="${currentMenu == 'content-generate'} ? 'active' : ''">✏️ 콘텐츠 생성</a>
          <a th:href="@{/feedbacks}" class="nav-pill" th:classappend="${currentMenu == 'feedback'} ? 'active' : ''">💬 리뷰 관리</a>
          <a th:href="@{/channel-performance}" class="nav-pill" th:classappend="${currentMenu == 'performance'} ? 'active' : ''">📊 성과 분석</a>
          <a th:href="@{/mypage}" class="nav-pill" th:classappend="${currentMenu == 'mypage'} ? 'active' : ''">👤 마이페이지</a>
        </nav>
		<div class="header-user">
		        <button th:if="${currentMenu == 'mypage'}" class="hamburger" onclick="openDrawer()" aria-label="메뉴 열기">
		            <span></span><span></span><span></span>
		        </button>
		        
		        <div class="user-avatar" th:text="${userInfo != null and userInfo.name != null ? userInfo.name.substring(0,1) : '?'}"></div>
		        <span class="user-name" th:text="${userInfo != null and userInfo.name != null ? userInfo.name + ' 님' : '게스트'}"></span>
		    </div>
      </div>
      <div class="header-row2">
        <nav class="nav-pills nav-pills-bottom">
          <a th:href="@{/content/generate}" class="nav-pill" th:classappend="${currentMenu == 'content-generate'} ? 'active' : ''">✏️ 콘텐츠 생성</a>
          <a th:href="@{/feedbacks}" class="nav-pill" th:classappend="${currentMenu == 'feedback'} ? 'active' : ''">💬 리뷰 관리</a>
          <a th:href="@{/channel-performance}" class="nav-pill" th:classappend="${currentMenu == 'performance'} ? 'active' : ''">📊 성과 분석</a>
          <a th:href="@{/mypage}" class="nav-pill" th:classappend="${currentMenu == 'mypage'} ? 'active' : ''">👤 마이페이지</a>
        </nav>
      </div>
    </header>
  </div>
</body>
</html>
