<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
  <div th:fragment="global-header">
    
    <style>
      /* 모든 페이지에 공통으로 필요한 변수와 리셋 (이미 전역으로 있다면 생략 가능) */
      :root {
        --teal:#14B8A6; --teal-light:#CCFBF1; --teal-mid:#5EEAD4; --teal-dark:#0D9488;
        --slate:#F1F5F9; --slate2:#E2E8F0;
        --indigo:#6366F1; --indigo-light:#EEF2FF; --indigo-dark:#4F46E5;
        --text:#0F172A; --text2:#475569; --text3:#94A3B8;
        --white:#FFFFFF; --border:#E2E8F0; --border2:#CBD5E1;
        --radius:14px; --radius-sm:9px;
        --shadow-sm:0 1px 3px rgba(15,23,42,.07);
        --shadow:0 4px 16px rgba(15,23,42,.08),0 2px 6px rgba(15,23,42,.05);
      }
      
		body {
		    margin: 0;
		    padding: 0;
		}

      /* 헤더 영역 스타일 */
      .top-stripe{height:4px;background:linear-gradient(90deg,var(--teal) 0%,var(--indigo) 60%,var(--teal-mid) 100%);}
      header{background:var(--white);border-bottom:1px solid var(--border);box-shadow:var(--shadow-sm);flex-shrink:0;position:sticky;top:0;z-index:200;display:flex;flex-direction:column;}
      .header-row1{display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:64px;flex-shrink:0;}
      .header-row2{display:flex;border-top:1px solid var(--border);padding:4px 8px;background:var(--white);}
      @media(min-width:901px){ .header-row2{display:none;} }
      
      .logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;flex-shrink:0;}
      .logo-mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--teal),var(--indigo));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#fff;box-shadow:0 2px 8px rgba(20,184,166,.35);flex-shrink:0;}
      .logo-name{font-size:15px;font-weight:700;letter-spacing:-.3px;}
      .logo-sub{font-size:11px;color:var(--text3);margin-left:6px;}
      
      .nav-pills{display:flex;gap:4px;}
      .nav-pill{padding:6px 14px;border-radius:100px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid transparent;color:var(--text2);background:transparent;transition:all .2s;font-family:'Noto Sans KR',sans-serif;text-decoration:none;display:flex;align-items:center;gap:5px;}
      .nav-pill:hover{background:var(--slate);color:var(--text);}
      .nav-pill.active{background:var(--indigo-light);border-color:#C7D2FE;color:var(--indigo-dark);font-weight:600;}
      
      .header-user{display:flex;align-items:center;gap:10px;flex-shrink:0;}
      .user-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--indigo));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;cursor:pointer;flex-shrink:0;}
      .user-name{font-size:13px;font-weight:600;color:var(--text2);}
      
      .hamburger{display:none;flex-direction:column;justify-content:center;align-items:center;gap:5px;width:38px;height:38px;border-radius:9px;background:transparent;border:1.5px solid var(--border);cursor:pointer;padding:0;flex-shrink:0;transition:background .15s;}
      .hamburger:hover{background:var(--slate);}
      .hamburger span{display:block;width:18px;height:2px;background:var(--text2);border-radius:2px;}

      /* 드로어 (모바일 메뉴) 오버레이 및 패널 스타일 */
      .drawer-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.35);z-index:300;backdrop-filter:blur(2px);}
      .drawer-overlay.open{display:block;}
      .drawer{position:fixed;top:0;left:0;bottom:0;width:272px;background:var(--white);z-index:400;transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);overflow-y:auto;padding:20px 0 40px;box-shadow:4px 0 24px rgba(15,23,42,.12);}
      .drawer.open{transform:translateX(0);}
      .drawer-close{display:flex;align-items:center;justify-content:flex-end;padding:0 16px 12px;}
      .drawer-close-btn{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);background:transparent;cursor:pointer;font-size:16px;color:var(--text3);display:flex;align-items:center;justify-content:center;transition:background .15s;}
      .drawer-close-btn:hover{background:var(--slate);color:var(--text);}
      
      /* 헤더 모바일 반응형 */
      @media(max-width:900px){
        .hamburger{display:flex;}
        .header-row1{padding:0 16px;height:56px;}
        .header-row2{display:flex;}
        .nav-pills-top{display:none;}
        .nav-pills-bottom{width:100%;gap:2px;}
        .nav-pills-bottom .nav-pill{flex:1;justify-content:center;padding:6px 4px;font-size:11px;}
        .logo-sub{display:none;}
        .user-name{display:none;}
      }
    </style>

    <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
    <div class="drawer" id="drawer">
      <div class="drawer-close">
        <button class="drawer-close-btn" onclick="closeDrawer()">✕</button>
      </div>
      <div class="sidebar-profile" style="margin:0 16px 14px;border-radius:var(--radius);border:1.5px solid var(--border);box-shadow:var(--shadow);padding:18px 16px;text-align:center;">
        <div class="profile-avatar-wrap" style="position:relative;width:72px;height:72px;margin:0 auto 12px;">
          <div class="profile-avatar" style="width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--indigo));display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;color:#fff;" th:text="${userInfo.name != null ? userInfo.name.substring(0,1) : '?'}"></div>
        </div>
        <div class="profile-name" style="font-size:15px;font-weight:800;margin-bottom:2px;" th:text="${userInfo.name}"></div>
        <div class="profile-email" style="font-size:11px;color:var(--text3);" th:text="${userInfo.email}"></div>
      </div>
      <nav class="sidebar-nav" style="margin:0 16px;border-radius:var(--radius);border:1.5px solid var(--border);box-shadow:var(--shadow);overflow:hidden;">
        <div class="snav-item" onclick="location.href='mypage?sec=member'"><span class="sni">👤</span>마이페이지 이동</div>
      </nav>
    </div>

    <div class="top-stripe"></div>
    <header>
      <div class="header-row1">
        <a href="#" class="logo">
          <div class="logo-mark">S</div>
          <span class="logo-name">소셜다모아</span>
          <span class="logo-sub">All Social Gather</span>
        </a>
        <nav class="nav-pills nav-pills-top">
          <a href="content-generate" class="nav-pill">✏️ 콘텐츠 생성</a>
          <a href="feedback" class="nav-pill">💬 리뷰 관리</a>
          <a href="channel-performance" class="nav-pill">📊 성과 분석</a>
          <a href="mypage" class="nav-pill active">👤 마이페이지</a>
        </nav>
        <div class="header-user">
          <button class="hamburger" onclick="openDrawer()" aria-label="메뉴 열기">
            <span></span><span></span><span></span>
          </button>
          <div class="user-avatar" th:text="${userInfo.name != null ? userInfo.name.substring(0,1) : '?'}"></div>
          <span class="user-name" th:text="${userInfo.name + ' 님'}"></span>
        </div>
      </div>
      <div class="header-row2">
        <nav class="nav-pills nav-pills-bottom">
          </nav>
      </div>
    </header>

    <script>
      function openDrawer(){
        document.getElementById('drawer').classList.add('open');
        document.getElementById('drawerOverlay').classList.add('open');
        document.body.style.overflow='hidden';
      }
      function closeDrawer(){
        document.getElementById('drawer').classList.remove('open');
        document.getElementById('drawerOverlay').classList.remove('open');
        document.body.style.overflow='';
      }
      /* ESC 키로 닫기 */
      document.addEventListener('keydown', e => { if(e.key === 'Escape') closeDrawer(); });
    </script>
    
  </div>
</body>
</html>
