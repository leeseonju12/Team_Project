<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>ASG - Dashboard</title>
</head>
<body>
    <h1>안녕하세요, <span th:text="${user.nickname}">사용자</span>님! 👋</h1>
    <p>연동된 SNS 채널을 관리하세요.</p>
    <p>현재 로그인 사용자: <strong th:text="${loginUser.name}"></strong> (<span th:text="${loginUser.email}"></span>)</p>
    <p>로그인 방식: <span th:text="${loginUser.provider}"></span></p>

    <div>
        <button type="button" onclick="logout()">로그아웃</button>
    </div>

    <script>
        async function logout() {
            try {
                const response = await fetch('/api/auth/logout', {
                    method: 'POST',
                    credentials: 'include'
                });

                if (!response.ok) {
                    throw new Error('로그아웃 실패');
                }

                console.log('로그아웃을 성공 했습니다');
                alert('로그아웃 되었습니다.');
                window.location.href = '/landing-page';

            } catch (error) {
                console.error('로그아웃 실패:', error);
                alert('로그아웃 중 오류가 발생했습니다.');
            }
        }
    </script>
</body>
</html>
