<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소셜다모아 관리자</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;800;900&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root{
            --bg:#f8fbfc; --surface:#fff; --surface2:#f1f5f9; --surface3:#e8eef5;
            --border:rgba(71,85,105,.14); --border2:rgba(71,85,105,.2);
            --primary:#14b8a6; --secondary:#6366f1;
            --danger:#ef4444; --warn:#f59e0b; --success:#10b981;
            --text:#0f172a; --text2:#475569; --text3:#64748b;
            --radius:18px;
        }

        *{margin:0;padding:0;box-sizing:border-box}

        body{
            font-family:'Noto Sans KR',sans-serif;
            background:
                    radial-gradient(circle at 12% 18%,rgba(20,184,166,.08),transparent 28%),
                    radial-gradient(circle at 84% 12%,rgba(99,102,241,.09),transparent 28%),
                    linear-gradient(180deg,#fff 0%,#f8fbfc 100%);
            color:var(--text);
            min-height:100vh;
        }

        .login-wrap{
            position:fixed; inset:0; background:rgba(15,23,42,.35);
            backdrop-filter:blur(8px);
            display:none; align-items:center; justify-content:center;
            padding:20px; z-index:100;
        }

        .login-box{
            width:100%; max-width:420px;
            background:rgba(255,255,255,.96);
            border:1px solid var(--border);
            border-radius:24px;
            box-shadow:0 30px 60px rgba(15,23,42,.18);
            padding:28px;
        }

        .login-logo{display:flex;align-items:center;gap:12px;margin-bottom:20px}
        .login-logo-mark{
            width:42px;height:42px;border-radius:14px;
            background:linear-gradient(135deg,var(--primary),var(--secondary));
            color:#fff;display:flex;align-items:center;justify-content:center;
            font-weight:900;font-size:18px;
        }
        .login-logo-text{font-size:19px;font-weight:800}
        .login-sub{font-size:12px;color:var(--text3);margin-bottom:6px}
        .login-title{font-size:24px;font-weight:900;margin-bottom:18px}
        .login-input{
            width:100%; padding:13px 14px; margin-bottom:10px;
            border:1px solid var(--border2); border-radius:12px;
            background:#fff; font-size:14px;
        }
        .login-btn{
            width:100%; padding:13px 14px; border:none; border-radius:12px;
            background:linear-gradient(135deg,#0f766e,#334155);
            color:#fff; font-weight:800; font-size:14px; cursor:pointer; margin-top:4px;
        }
        .login-err{
            margin-top:12px;font-size:13px;color:var(--danger);
            display:none;white-space:pre-wrap;line-height:1.6;
        }

        .wrapper{max-width:1320px;margin:0 auto;padding:0 24px 80px}
        header{
            display:flex;align-items:center;justify-content:space-between;
            padding:28px 0 20px;border-bottom:1px solid var(--border);gap:12px;
        }
        .logo{display:flex;align-items:center;gap:12px}
        .logo-mark{
            width:38px;height:38px;border-radius:12px;
            background:linear-gradient(135deg,var(--primary),var(--secondary));
            display:flex;align-items:center;justify-content:center;
            color:#fff;font-size:18px;font-weight:900;
            box-shadow:0 0 24px rgba(20,184,166,.35);flex-shrink:0;
        }
        .logo-text{font-size:18px;font-weight:800}
        .header-right{display:flex;align-items:center;gap:10px}
        .header-badge{
            background:rgba(20,184,166,.08); border:1px solid rgba(20,184,166,.18);
            border-radius:999px; padding:7px 14px; font-size:12px; color:#0f766e;
        }
        .logout-btn{
            border:none; background:#0f172a; color:#fff; cursor:pointer;
            border-radius:12px; padding:10px 14px; font-size:13px; font-weight:700;
        }

        .page-title{
            margin-top:28px; padding:30px 30px 24px; border-radius:20px;
            border:1px solid var(--border);
            background:linear-gradient(180deg,rgba(255,255,255,.96),rgba(248,251,252,.98));
            box-shadow:0 18px 40px rgba(15,23,42,.08);
        }
        .page-title h1{
            font-family:'DM Serif Display',serif;
            font-size:clamp(30px,4vw,44px); font-weight:400; line-height:1.1;
        }
        .page-title h1 em{
            font-style:italic;
            background:linear-gradient(135deg,var(--primary),var(--secondary));
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
        }
        .page-title p{margin-top:10px;color:var(--text2);font-size:15px}

        .tab-nav{
            margin-top:20px;
            display:grid; grid-template-columns:repeat(3,1fr); gap:10px;
        }
        .tab-btn{
            height:56px; border-radius:14px; border:1px solid var(--border);
            background:rgba(241,245,249,.88); color:var(--text2);
            font-size:15px; font-weight:800; cursor:pointer;
        }
        .tab-btn.active{
            background:linear-gradient(135deg,var(--primary),var(--secondary));
            color:#fff; border-color:transparent; box-shadow:0 10px 28px rgba(20,184,166,.22);
        }

        .summary-grid{
            margin-top:18px;
            display:grid; grid-template-columns:repeat(4,1fr); gap:14px;
        }
        .s-card{
            border:1px solid var(--border); border-radius:18px;
            background:rgba(255,255,255,.92); padding:18px 18px 16px;
            box-shadow:0 12px 26px rgba(15,23,42,.05);
        }
        .sl{font-size:13px;color:var(--text3);font-weight:700}
        .sn{margin-top:8px;font-size:28px;font-weight:900;color:var(--text)}
        .ss{margin-top:6px;font-size:12px;color:var(--text3)}

        .section{display:none}
        .section.active{display:block}

        .admin-grid{
            margin-top:18px;
            display:grid; grid-template-columns:300px minmax(0,1fr); gap:18px;
        }

        .panel{
            border:1px solid var(--border); border-radius:18px;
            background:linear-gradient(180deg,rgba(255,255,255,.96),rgba(248,251,252,.98));
            box-shadow:0 16px 32px rgba(15,23,42,.06);
            overflow:hidden;
        }
        .panel-header{
            padding:16px 18px; border-bottom:1px solid var(--border);
            display:flex; align-items:center; gap:10px; justify-content:space-between;
        }
        .panel-header-left{
            display:flex; align-items:center; gap:10px;
        }
        .panel-icon{
            width:32px;height:32px;border-radius:10px;
            display:flex;align-items:center;justify-content:center;
            background:rgba(20,184,166,.14); font-size:14px;
        }
        .panel-header h2{font-size:14px;font-weight:800}
        .panel-body{padding:18px}

        .fi{
            display:flex; align-items:center; justify-content:space-between;
            gap:10px; padding:12px 14px; border-radius:12px;
            border:1px solid var(--border); background:#fff; cursor:pointer;
            font-size:13px; font-weight:700; color:var(--text2); margin-bottom:10px;
        }
        .fi.active, .stab.active{
            border-color:rgba(20,184,166,.45);
            box-shadow:0 0 0 3px rgba(20,184,166,.08);
            color:var(--text);
        }
        .fc{
            min-width:26px; text-align:center; padding:4px 8px; border-radius:999px;
            background:var(--surface2); font-size:12px; color:var(--text3);
        }

        .search-row{
            display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px;
        }
        .search-input, .sel, .field input, .field textarea, .field select{
            width:100%; border:1px solid var(--border2); background:#fff;
            border-radius:12px; padding:12px 14px; font-size:14px; color:var(--text);
            font-family:'Noto Sans KR',sans-serif;
        }
        .search-input{flex:1; min-width:220px}
        .sel{width:auto; min-width:140px}

        .status-tabs{
            display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px;
        }
        .stab{
            border:1px solid var(--border); background:#fff; color:var(--text2);
            border-radius:999px; padding:10px 14px; cursor:pointer; font-size:13px; font-weight:700;
        }

        .accordion-card{
            border:1px solid var(--border); background:#fff;
            border-radius:18px; padding:16px; margin-bottom:12px;
            box-shadow:0 8px 20px rgba(15,23,42,.04);
        }

        .i-type{
            background:rgba(99,102,241,.1); color:#4338ca; border:1px solid rgba(99,102,241,.18);
            border-radius:999px; padding:5px 10px; font-size:11px; font-weight:800;
            flex-shrink:0;
        }

        .sb{
            border-radius:999px; padding:5px 10px; font-size:11px; font-weight:800;
            flex-shrink:0;
        }
        .sb-p{background:rgba(249,115,22,.12); color:#c2410c}
        .sb-r{background:rgba(59,130,246,.12); color:#1d4ed8}
        .sb-d{background:rgba(16,185,129,.12); color:#047857}

        .body-text{
            background:var(--surface2); border:1px solid var(--border); border-radius:14px;
            padding:14px 16px; line-height:1.8; color:var(--text2); white-space:pre-wrap;
        }

        .reply-ta{
            width:100%; margin-top:12px; border:1px solid var(--border2); background:#fff;
            border-radius:12px; padding:12px 14px; min-height:120px; resize:vertical;
            font-family:'Noto Sans KR',sans-serif;
        }

        .btn-main, .btn-line, .btn-danger, .btn-add{
            border:none; border-radius:12px; padding:11px 14px; cursor:pointer;
            font-size:13px; font-weight:800;
        }
        .btn-main{
            background:linear-gradient(135deg,var(--primary),var(--secondary)); color:#fff;
        }
        .btn-line{
            background:#fff; color:var(--text2); border:1px solid var(--border2);
        }
        .btn-danger{
            background:#fff1f2; color:#be123c; border:1px solid rgba(244,63,94,.18);
        }
        .btn-add{
            background:linear-gradient(135deg,var(--primary),var(--secondary));
            color:#fff;
            box-shadow:0 10px 24px rgba(20,184,166,.18);
        }

        .accordion-header{
            display:flex;
            align-items:center;
            gap:12px;
            cursor:pointer;
            user-select:none;
        }

        .accordion-title{
            flex:1;
            min-width:0;
            font-size:15px;
            font-weight:800;
            color:var(--text);
            line-height:1.5;
            word-break:keep-all;
        }

        .accordion-meta{
            display:flex;
            align-items:center;
            gap:8px;
            flex-wrap:wrap;
            flex-shrink:0;
        }

        .accordion-badge{
            display:inline-flex;
            align-items:center;
            justify-content:center;
            min-width:54px;
            padding:5px 12px;
            border-radius:999px;
            font-size:11px;
            font-weight:800;
            background:rgba(99,102,241,.10);
            color:#4338CA;
            border:1px solid rgba(99,102,241,.18);
            white-space:nowrap;
        }

        .accordion-date{
            font-size:12px;
            color:var(--text3);
            font-weight:600;
            white-space:nowrap;
        }

        .accordion-arrow{
            width:28px;
            height:28px;
            border-radius:8px;
            display:flex;
            align-items:center;
            justify-content:center;
            color:var(--text3);
            font-size:13px;
            transition:all .2s;
            border:1px solid transparent;
            flex-shrink:0;
        }

        .accordion-card.open .accordion-arrow{
            transform:rotate(180deg);
            color:#fff;
            background:linear-gradient(135deg,var(--primary),var(--secondary));
            box-shadow:0 6px 18px rgba(20,184,166,.18);
        }

        .accordion-body{
            display:none;
            margin-top:14px;
            border-top:1px solid var(--border);
            padding-top:14px;
            animation:fadeIn .22s ease;
        }

        .accordion-card.open .accordion-body{
            display:block;
        }

        .accordion-content{
            background:var(--surface2);
            border:1px solid var(--border);
            border-radius:14px;
            padding:14px 16px;
            line-height:1.8;
            color:var(--text2);
            white-space:pre-wrap;
        }

        .accordion-actions{
            display:flex;
            justify-content:flex-end;
            gap:8px;
            margin-top:12px;
            flex-wrap:wrap;
            align-items:center;
        }

        .detail-meta{
            margin-top:10px;
            font-size:12px;
            color:var(--text3);
            line-height:1.7;
        }

        .attachment-box{
            margin-top:14px;
            border:1px solid var(--border);
            border-radius:14px;
            background:#fff;
            padding:14px;
        }

        .attachment-title{
            font-size:12px;
            font-weight:800;
            color:var(--text3);
            margin-bottom:10px;
        }

        .attachment-link{
            width:100%;
            display:flex;
            align-items:center;
            gap:8px;
            padding:11px 12px;
            border:1px solid var(--border);
            background:var(--surface2);
            border-radius:10px;
            color:var(--text2);
            text-decoration:none;
            font-size:13px;
            line-height:1.5;
            margin-top:8px;
            word-break:break-all;
            text-align:left;
            cursor:pointer;
        }

        .attachment-link:first-of-type{
            margin-top:0;
        }

        .reply-box{
            margin-top:14px;
            padding:14px;
            border:1px solid var(--border);
            border-radius:14px;
            background:#fff;
        }

        .reply-meta{
            font-size:12px;
            font-weight:800;
            color:var(--text3);
            margin-bottom:10px;
        }

        .reply-card{
            border:1px solid var(--border);
            background:var(--surface2);
            border-radius:14px;
            padding:14px;
            margin-top:10px;
        }

        .reply-card:first-of-type{
            margin-top:0;
        }

        .reply-view-text{
            white-space:pre-wrap;
            color:var(--text2);
            line-height:1.8;
            font-size:13px;
            word-break:break-word;
        }

        .reply-edit-ta{
            width:100%;
            min-height:110px;
            border:1px solid var(--border2);
            background:#fff;
            border-radius:12px;
            padding:12px 14px;
            font-size:13px;
            color:var(--text);
            line-height:1.7;
            font-family:'Noto Sans KR',sans-serif;
            resize:vertical;
        }

        .reply-inline-actions{
            display:flex;
            justify-content:flex-end;
            gap:8px;
            margin-top:10px;
            flex-wrap:wrap;
        }

        .reply-empty{
            border:1px dashed var(--border2);
            border-radius:12px;
            padding:18px 14px;
            text-align:center;
            font-size:13px;
            color:var(--text3);
            background:rgba(241,245,249,.5);
        }

        .new-reply-box{
            margin-top:14px;
            border:1px solid var(--border);
            border-radius:14px;
            background:#fff;
            padding:14px;
        }

        .new-reply-title{
            font-size:12px;
            font-weight:800;
            color:var(--text3);
            margin-bottom:10px;
        }

        .empty-list{
            display:flex; flex-direction:column; align-items:center;
            padding:54px 20px; color:var(--text3); text-align:center;
            white-space:pre-wrap;
        }
        .el-icon{font-size:36px; margin-bottom:12px; opacity:.5}

        .modal-wrap{
            position:fixed;
            inset:0;
            background:rgba(15,23,42,.42);
            backdrop-filter:blur(8px);
            display:none;
            align-items:center;
            justify-content:center;
            z-index:200;
            padding:20px;
        }

        .modal-wrap.show{
            display:flex;
        }

        .modal-box{
            width:100%;
            max-width:620px;
            background:rgba(255,255,255,.98);
            border:1px solid var(--border);
            border-radius:24px;
            box-shadow:0 30px 60px rgba(15,23,42,.18);
            overflow:hidden;
        }

        .modal-header{
            padding:20px 22px 16px;
            border-bottom:1px solid var(--border);
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:12px;
        }

        .modal-header h3{
            font-size:18px;
            font-weight:900;
            color:var(--text);
        }

        .modal-close{
            width:36px;
            height:36px;
            border:none;
            border-radius:12px;
            background:var(--surface2);
            cursor:pointer;
            font-size:16px;
            color:var(--text2);
            font-weight:900;
        }

        .modal-body{
            padding:20px 22px;
            display:grid;
            gap:14px;
        }

        .field label{
            display:block;
            margin-bottom:8px;
            font-size:13px;
            font-weight:800;
            color:var(--text);
        }

        .field textarea{
            min-height:160px;
            resize:vertical;
        }

        .modal-error{
            display:none;
            margin:0 22px 14px;
            padding:12px 14px;
            border-radius:12px;
            background:#fff1f2;
            border:1px solid rgba(244,63,94,.18);
            color:#be123c;
            font-size:13px;
            font-weight:700;
            line-height:1.6;
            white-space:pre-wrap;
        }

        .modal-error.show{
            display:block;
        }

        .modal-actions{
            padding:0 22px 22px;
            display:flex;
            justify-content:flex-end;
            gap:10px;
            flex-wrap:wrap;
        }

        @keyframes fadeIn {
            from { opacity:0; transform:translateY(-4px); }
            to { opacity:1; transform:translateY(0); }
        }

        @media (max-width:1100px){
            .admin-grid{grid-template-columns:1fr}
            .summary-grid{grid-template-columns:repeat(2,1fr)}
        }

        @media (max-width:760px){
            .wrapper{padding:0 16px 56px}
            header{flex-direction:column;align-items:flex-start}
            .tab-nav{grid-template-columns:1fr}
            .summary-grid{grid-template-columns:1fr}
            .search-row{flex-direction:column}
            .sel{width:100%}
            .accordion-header{
                align-items:flex-start;
                flex-wrap:wrap;
            }
            .accordion-meta{
                width:100%;
            }
            .accordion-arrow{
                margin-left:auto;
            }
        }
    </style>
</head>
<body>

<div id="loginWrap" class="login-wrap">
    <div class="login-box">
        <div class="login-logo">
            <div class="login-logo-mark">S</div>
            <div class="login-logo-text">소셜다모아</div>
        </div>
        <div class="login-sub">Admin Panel</div>
        <div class="login-title">관리자 로그인</div>

        <input id="adminId" class="login-input" placeholder="아이디">
        <input id="adminPw" class="login-input" type="password" placeholder="비밀번호">

        <button class="login-btn" onclick="adminLogin()">로그인</button>
        <div id="loginErr" class="login-err">로그인 실패</div>
    </div>
</div>

<div id="noticeModal" class="modal-wrap">
    <div class="modal-box">
        <div class="modal-header">
            <h3 id="noticeModalTitle">공지 추가</h3>
            <button class="modal-close" onclick="closeNoticeModal()">✕</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="noticeId">

            <div class="field">
                <label for="noticeCategory">분류</label>
                <select id="noticeCategory">
                    <option value="공지">공지</option>
                    <option value="업데이트">업데이트</option>
                    <option value="정책">정책</option>
                    <option value="보안">보안</option>
                </select>
            </div>

            <div class="field">
                <label for="noticeTitle">제목</label>
                <input id="noticeTitle" maxlength="200" placeholder="공지 제목 입력">
            </div>

            <div class="field">
                <label for="noticeContent">내용</label>
                <textarea id="noticeContent" placeholder="공지 내용을 입력하세요"></textarea>
            </div>
        </div>
        <div id="noticeModalError" class="modal-error"></div>
        <div class="modal-actions">
            <button class="btn-line" type="button" onclick="closeNoticeModal()">취소</button>
            <button class="btn-main" type="button" onclick="saveNotice()">저장</button>
        </div>
    </div>
</div>

<div id="faqModal" class="modal-wrap">
    <div class="modal-box">
        <div class="modal-header">
            <h3 id="faqModalTitle">FAQ 추가</h3>
            <button class="modal-close" onclick="closeFaqModal()">✕</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="faqId">

            <div class="field">
                <label for="faqCategory">카테고리</label>
                <select id="faqCategory">
                    <option value="">카테고리 선택</option>
                    <option value="가입·연동">가입·연동</option>
                    <option value="콘텐츠 생성">콘텐츠 생성</option>
                    <option value="시스템오류">시스템오류</option>
                    <option value="계정">계정</option>
                </select>
            </div>

            <div class="field">
                <label for="faqQuestion">질문</label>
                <input id="faqQuestion" maxlength="255" placeholder="질문 입력">
            </div>

            <div class="field">
                <label for="faqAnswer">답변</label>
                <textarea id="faqAnswer" placeholder="답변 입력"></textarea>
            </div>
        </div>
        <div id="faqModalError" class="modal-error"></div>
        <div class="modal-actions">
            <button class="btn-line" type="button" onclick="closeFaqModal()">취소</button>
            <button class="btn-main" type="button" onclick="saveFaq()">저장</button>
        </div>
    </div>
</div>

<div class="wrapper">
    <header>
        <div class="logo">
            <div class="logo-mark">S</div>
            <div class="logo-text">소셜다모아</div>
        </div>
        <div class="header-right">
            <div class="header-badge">관리자 페이지</div>
            <button class="logout-btn" onclick="logout()">로그아웃</button>
        </div>
    </header>

    <div class="page-title">
        <h1>관리자 <em>통합 운영</em><br>한곳에서 관리하세요</h1>
        <p>공지사항, FAQ, 문의 답변을 하나의 관리자 페이지에서 관리합니다.</p>
    </div>

    <div class="tab-nav">
        <button class="tab-btn active" data-tab="inquiry">문의 관리</button>
        <button class="tab-btn" data-tab="notice">공지사항 관리</button>
        <button class="tab-btn" data-tab="faq">FAQ 관리</button>
    </div>

    <div id="sectionInquiry" class="section active">
        <div class="summary-grid">
            <div class="s-card">
                <div class="sl">전체 문의</div>
                <div class="sn" id="cntAll">0</div>
                <div class="ss">누적 접수</div>
            </div>
            <div class="s-card">
                <div class="sl">⏳ 미처리</div>
                <div class="sn" id="cntP">0</div>
                <div class="ss">확인 필요</div>
            </div>
            <div class="s-card">
                <div class="sl">🔄 처리중</div>
                <div class="sn" id="cntR">0</div>
                <div class="ss">검토 진행</div>
            </div>
            <div class="s-card">
                <div class="sl">✅ 처리완료</div>
                <div class="sn" id="cntD">0</div>
                <div class="ss">완료</div>
            </div>
        </div>

        <div class="admin-grid">
            <div>
                <div class="panel">
                    <div class="panel-header">
                        <div class="panel-icon">🗂</div>
                        <h2>유형별 필터</h2>
                    </div>
                    <div class="panel-body">
                        <div class="fi active" data-f="전체" onclick="applyF(this)">전체 <span class="fc" id="fc-전체">0</span></div>
                        <div class="fi" data-f="가입·연동" onclick="applyF(this)">가입·연동 <span class="fc" id="fc-가입·연동">0</span></div>
                        <div class="fi" data-f="콘텐츠 생성" onclick="applyF(this)">콘텐츠 생성 <span class="fc" id="fc-콘텐츠 생성">0</span></div>
                        <div class="fi" data-f="시스템오류" onclick="applyF(this)">시스템오류 <span class="fc" id="fc-시스템오류">0</span></div>
                        <div class="fi" data-f="계정" onclick="applyF(this)">계정 <span class="fc" id="fc-계정">0</span></div>
                        <div class="fi" data-f="기타" onclick="applyF(this)">기타 <span class="fc" id="fc-기타">0</span></div>
                    </div>
                </div>
            </div>

            <div>
                <div class="panel">
                    <div class="panel-header">
                        <div class="panel-header-left">
                            <div class="panel-icon">📨</div>
                            <h2 id="listTitle">전체 문의</h2>
                        </div>
                    </div>
                    <div class="panel-body">
                        <div class="search-row">
                            <input id="searchInput" class="search-input" placeholder="제목, 이메일, 내용, 유형 검색" oninput="handleSearch(this.value)">
                            <select class="sel" onchange="changeSort(this.value)">
                                <option value="latest">최신순</option>
                                <option value="oldest">오래된순</option>
                                <option value="pending">미처리 우선</option>
                            </select>
                        </div>

                        <div class="status-tabs">
                            <button class="stab active" onclick="applyS('전체', this)">전체</button>
                            <button class="stab" onclick="applyS('미처리', this)">미처리</button>
                            <button class="stab" onclick="applyS('처리중', this)">처리중</button>
                            <button class="stab" onclick="applyS('처리완료', this)">처리완료</button>
                        </div>

                        <div id="inquiryList"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="sectionNotice" class="section">
        <div class="panel" style="margin-top:18px;">
            <div class="panel-header">
                <div class="panel-header-left">
                    <div class="panel-icon">📢</div>
                    <h2>공지사항 관리</h2>
                </div>
                <button class="btn-add" onclick="openNoticeModal()">+ 공지 추가</button>
            </div>
            <div class="panel-body">
                <div class="search-row">
                    <input id="noticeKeyword" class="search-input" placeholder="공지 제목 / 내용 검색" oninput="renderNotices()">
                </div>
                <div id="noticeList"></div>
            </div>
        </div>
    </div>

    <div id="sectionFaq" class="section">
        <div class="panel" style="margin-top:18px;">
            <div class="panel-header">
                <div class="panel-header-left">
                    <div class="panel-icon">❓</div>
                    <h2>FAQ 관리</h2>
                </div>
                <button class="btn-add" onclick="openFaqModal()">+ FAQ 추가</button>
            </div>
            <div class="panel-body">
                <div class="search-row">
                    <input id="faqKeyword" class="search-input" placeholder="카테고리 / 질문 / 답변 검색" oninput="renderFaqs()">
                </div>
                <div id="faqAdminList"></div>
            </div>
        </div>
    </div>
</div>

<script>
    let inquiries = [];
    let notices = [];
    let faqs = [];

    let curFilter = '전체';
    let curStatus = '전체';
    let curKeyword = '';
    let curSort = 'latest';

    const SC = {
        '미처리':'sb-p',
        '처리중':'sb-r',
        '처리완료':'sb-d'
    };

    const SL = {
        '미처리':'⏳ 미처리',
        '처리중':'🔄 처리중',
        '처리완료':'✅ 처리완료'
    };

    function esc(s) {
        return String(s || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/\n/g, '<br>');
    }

    function jsEsc(s) {
        return String(s || '')
            .replace(/\\/g, '\\\\')
            .replace(/'/g, "\\'")
            .replace(/\n/g, "\\n")
            .replace(/\r/g, "");
    }

    function formatDate(dateString) {
        if (!dateString) return '-';
        const d = new Date(dateString);
        if (Number.isNaN(d.getTime())) return String(dateString);
        return d.toLocaleString('ko-KR', {
            year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'
        });
    }

    function parseAttachmentNames(text) {
        if (!text || !String(text).trim()) return [];
        return String(text).split(',').map(v => v.trim()).filter(Boolean);
    }

    // ✅ 변경: localStorage -> sessionStorage
    function getAdminToken() {
        return sessionStorage.getItem('adminToken') || '';
    }

    async function fetchWithAdmin(url, options = {}) {
        const token = getAdminToken();

        const headers = Object.assign({}, options.headers || {}, {
            'admin-token': token,
            'Authorization': token ? `Bearer ${token}` : ''
        });

        const response = await fetch(url, Object.assign({}, options, { headers }));
        const raw = await response.text();

        let data = raw;
        try {
            data = raw ? JSON.parse(raw) : null;
        } catch (_) {
            data = raw;
        }

        if (!response.ok) {
            const bodyText = typeof data === 'string' ? data : JSON.stringify(data);
            throw new Error(`status=${response.status}\nbody=${bodyText}`);
        }

        return data;
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.tab === tab);
        });
        document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));

        if (tab === 'inquiry') document.getElementById('sectionInquiry').classList.add('active');
        if (tab === 'notice') document.getElementById('sectionNotice').classList.add('active');
        if (tab === 'faq') document.getElementById('sectionFaq').classList.add('active');
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            switchTab(this.dataset.tab);
        });
    });

    async function adminLogin() {
        const id = document.getElementById('adminId').value.trim();
        const pw = document.getElementById('adminPw').value.trim();
        const loginErr = document.getElementById('loginErr');

        loginErr.style.display = 'none';
        loginErr.textContent = '';

        try {
            const res = await fetch('/api/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, pw })
            });

            const raw = await res.text();
            let data;
            try {
                data = raw ? JSON.parse(raw) : {};
            } catch (_) {
                data = raw;
            }

            if (!res.ok) {
                throw new Error(`status=${res.status}\nbody=${typeof data === 'string' ? data : JSON.stringify(data)}`);
            }

            const token =
                (data && data.token) ||
                (data && data.adminToken) ||
                (data && data.accessToken) ||
                '';

            if (!token) {
                throw new Error('로그인 응답에 token 값이 없음');
            }

            // ✅ 변경: localStorage -> sessionStorage
            sessionStorage.setItem('adminToken', token);

            hideLogin();
            await bootstrapAdmin();
        } catch (err) {
            console.error(err);
            loginErr.textContent = '로그인 실패\n' + err.message;
            loginErr.style.display = 'block';
        }
    }

    function showLogin() {
        document.getElementById('loginWrap').style.display = 'flex';
    }

    function hideLogin() {
        document.getElementById('loginWrap').style.display = 'none';
        document.getElementById('loginErr').style.display = 'none';
    }

    function resetAdminState() {
        inquiries = [];
        notices = [];
        faqs = [];

        const adminIdEl = document.getElementById('adminId');
        const adminPwEl = document.getElementById('adminPw');
        const loginErrEl = document.getElementById('loginErr');

        if (adminIdEl) adminIdEl.value = '';
        if (adminPwEl) adminPwEl.value = '';
        if (loginErrEl) {
            loginErrEl.textContent = '';
            loginErrEl.style.display = 'none';
        }

        const inquiryListEl = document.getElementById('inquiryList');
        const noticeListEl = document.getElementById('noticeList');
        const faqListEl = document.getElementById('faqAdminList');

        if (inquiryListEl) inquiryListEl.innerHTML = '';
        if (noticeListEl) noticeListEl.innerHTML = '';
        if (faqListEl) faqListEl.innerHTML = '';

        const countIds = ['cntAll', 'cntP', 'cntR', 'cntD', 'fc-전체', 'fc-가입·연동', 'fc-콘텐츠 생성', 'fc-시스템오류', 'fc-계정', 'fc-기타'];
        countIds.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.textContent = '0';
        });
    }

    function logout() {
        // ✅ 변경: localStorage -> sessionStorage
        sessionStorage.removeItem('adminToken');
        resetAdminState();
        showLogin();
    }

    function updateCounts() {
        document.getElementById('cntAll').textContent = inquiries.length;
        document.getElementById('cntP').textContent = inquiries.filter(i => i.status === '미처리').length;
        document.getElementById('cntR').textContent = inquiries.filter(i => i.status === '처리중').length;
        document.getElementById('cntD').textContent = inquiries.filter(i => i.status === '처리완료').length;

        const types = ['가입·연동', '콘텐츠 생성', '시스템오류', '계정', '기타'];
        types.forEach(t => {
            const el = document.getElementById('fc-' + t);
            if (el) el.textContent = inquiries.filter(i => i.type === t).length;
        });
        document.getElementById('fc-전체').textContent = inquiries.length;
    }

    function handleSearch(value) {
        curKeyword = (value || '').toLowerCase();
        renderAdmin();
    }

    function changeSort(value) {
        curSort = value || 'latest';
        renderAdmin();
    }

    function applyF(el) {
        document.querySelectorAll('.fi').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        curFilter = el.dataset.f;
        document.getElementById('listTitle').textContent = curFilter === '전체' ? '전체 문의' : curFilter;
        renderAdmin();
    }

    function applyS(status, el) {
        document.querySelectorAll('.stab').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        curStatus = status;
        renderAdmin();
    }

    function matchesKeyword(inq, keyword) {
        if (!keyword) return true;
        return [
            inq.title || '',
            inq.email || '',
            inq.body || '',
            inq.type || ''
        ].join(' ').toLowerCase().includes(keyword);
    }

    function renderReplies(inq) {
        if (!inq.replies || !inq.replies.length) {
            return `
              <div class="reply-box">
                <div class="reply-meta">등록된 답변</div>
                <div class="reply-empty">등록된 답변이 없습니다.</div>
              </div>
            `;
        }

        return `
          <div class="reply-box">
            <div class="reply-meta">등록된 답변</div>
            ${inq.replies.map(r => `
              <div class="reply-card">
                <div id="reply-view-${r.id}" class="reply-view-text">${esc(r.content)}</div>

                <div id="reply-edit-wrap-${r.id}" style="display:none;">
                  <textarea
                    id="reply-edit-${r.id}"
                    class="reply-edit-ta"
                  >${r.content || ''}</textarea>

                  <div class="reply-inline-actions">
                    <button
                      type="button"
                      class="btn-line"
                      onclick="event.stopPropagation(); cancelReplyEdit(${r.id})">
                      취소
                    </button>
                    <button
                      type="button"
                      class="btn-main"
                      onclick="event.stopPropagation(); saveReplyEdit(${inq.id}, ${r.id})">
                      저장
                    </button>
                  </div>
                </div>

                <div class="reply-inline-actions" id="reply-actions-${r.id}">
                  <button
                    type="button"
                    class="btn-line"
                    onclick="event.stopPropagation(); openReplyEdit(${r.id})">
                    수정
                  </button>
                  <button
                    type="button"
                    class="btn-danger"
                    onclick="event.stopPropagation(); deleteReply(${inq.id}, ${r.id})">
                    삭제
                  </button>
                </div>
              </div>
            `).join('')}
          </div>
        `;
    }

    function toggleAccordionCard(el) {
        const card = el.closest('.accordion-card');
        if (card) card.classList.toggle('open');
    }

    function normalizeInquiry(item) {
        return {
            ...item,
            replies: Array.isArray(item.replies) ? item.replies : []
        };
    }

    async function loadInquiries() {
        try {
            const data = await fetchWithAdmin('/api/admin/inquiries');
            inquiries = Array.isArray(data) ? data.map(normalizeInquiry) : [];
            updateCounts();
            renderAdmin();
        } catch (err) {
            console.error('문의 목록 로드 실패', err);
            if (String(err.message || '').includes('status=401') || String(err.message || '').includes('status=403')) {
                alert('로그인이 만료되었습니다. 다시 로그인해주세요.');
                logout();
                return;
            }
            document.getElementById('inquiryList').innerHTML = `
              <div class="empty-list">
                <div class="el-icon">⚠️</div>
                <p>문의 목록을 불러오지 못했습니다.\n${esc(err.message)}</p>
              </div>
            `;
        }
    }

    function renderAdmin() {
        let list = [...inquiries];

        if (curFilter !== '전체') {
            list = list.filter(i => i.type === curFilter);
        }

        if (curStatus !== '전체') {
            list = list.filter(i => i.status === curStatus);
        }

        if (curKeyword) {
            list = list.filter(i => matchesKeyword(i, curKeyword));
        }

        if (curSort === 'latest') {
            list.sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
        } else if (curSort === 'oldest') {
            list.sort((a, b) => new Date(a.createdAt || 0) - new Date(b.createdAt || 0));
        } else if (curSort === 'pending') {
            const order = { '미처리': 0, '처리중': 1, '처리완료': 2 };
            list.sort((a, b) => {
                const byStatus = (order[a.status] ?? 99) - (order[b.status] ?? 99);
                if (byStatus !== 0) return byStatus;
                return new Date(b.createdAt || 0) - new Date(a.createdAt || 0);
            });
        }

        document.getElementById('inquiryList').innerHTML = list.length ? list.map(inq => `
          <div class="accordion-card">
            <div class="accordion-header" onclick="toggleAccordionCard(this)">
              <div class="accordion-title">${esc(inq.title)}</div>
              <div class="accordion-meta">
                <span class="i-type">${esc(inq.type)}</span>
                <span class="sb ${SC[inq.status] || 'sb-p'}">${SL[inq.status] || esc(inq.status)}</span>
                <span class="accordion-date">${esc(formatDate(inq.createdAt))}</span>
              </div>
              <div class="accordion-arrow">⌄</div>
            </div>

            <div class="accordion-body">
              <div class="accordion-content">${esc(inq.body)}</div>

              <div class="detail-meta">
                이메일: ${esc(inq.email)}<br>
                문의번호: ${esc(inq.id)}<br>
                상태: ${esc(inq.status)}
              </div>

              ${renderAttachments(inq)}
              ${renderReplies(inq)}

              <div class="new-reply-box">
                <div class="new-reply-title">답변 등록</div>
                <textarea id="reply-new-${inq.id}" class="reply-edit-ta" placeholder="답변 내용을 입력하세요"></textarea>
                <div class="reply-inline-actions">
                  <button type="button" class="btn-main" onclick="createReply(${inq.id})">답변 등록</button>
                </div>
              </div>
            </div>
          </div>
        `).join('') : `
          <div class="empty-list">
            <div class="el-icon">📭</div>
            <p>조건에 맞는 문의가 없습니다.</p>
          </div>
        `;
    }

    function renderAttachments(inq) {
        const names = Array.isArray(inq.attachmentNames)
            ? inq.attachmentNames
            : parseAttachmentNames(inq.attachmentNames);

        if (!names.length) return '';

        return `
          <div class="attachment-box">
            <div class="attachment-title">첨부파일</div>
            ${names.map(name => `
              <a
                class="attachment-link"
                href="/api/admin/inquiries/${inq.id}/attachments/${encodeURIComponent(name)}"
                target="_blank"
                onclick="event.stopPropagation()"
              >📎 ${esc(name)}</a>
            `).join('')}
          </div>
        `;
    }

    function openReplyEdit(replyId) {
        const view = document.getElementById(`reply-view-${replyId}`);
        const editWrap = document.getElementById(`reply-edit-wrap-${replyId}`);
        const actions = document.getElementById(`reply-actions-${replyId}`);

        if (view) view.style.display = 'none';
        if (editWrap) editWrap.style.display = 'block';
        if (actions) actions.style.display = 'none';
    }

    function cancelReplyEdit(replyId) {
        const view = document.getElementById(`reply-view-${replyId}`);
        const editWrap = document.getElementById(`reply-edit-wrap-${replyId}`);
        const actions = document.getElementById(`reply-actions-${replyId}`);

        if (view) view.style.display = 'block';
        if (editWrap) editWrap.style.display = 'none';
        if (actions) actions.style.display = 'flex';
    }

    async function createReply(inquiryId) {
        const textarea = document.getElementById(`reply-new-${inquiryId}`);
        const content = (textarea?.value || '').trim();

        if (!content) {
            alert('답변 내용을 입력하세요.');
            return;
        }

        try {
            await fetchWithAdmin(`/api/admin/inquiries/${inquiryId}/replies`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content })
            });

            textarea.value = '';
            await loadInquiries();
        } catch (err) {
            console.error(err);
            alert('답변 등록 실패\n' + err.message);
        }
    }

    async function saveReplyEdit(inquiryId, replyId) {
        const textarea = document.getElementById(`reply-edit-${replyId}`);
        const content = (textarea?.value || '').trim();

        if (!content) {
            alert('답변 내용을 입력하세요.');
            return;
        }

        try {
            await fetchWithAdmin(`/api/admin/inquiries/${inquiryId}/replies/${replyId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content })
            });

            await loadInquiries();
        } catch (err) {
            console.error(err);
            alert('답변 수정 실패\n' + err.message);
        }
    }

    async function deleteReply(inquiryId, replyId) {
        if (!confirm('답변을 삭제하시겠습니까?')) return;

        try {
            await fetchWithAdmin(`/api/admin/inquiries/${inquiryId}/replies/${replyId}`, {
                method: 'DELETE'
            });

            await loadInquiries();
        } catch (err) {
            console.error(err);
            alert('답변 삭제 실패\n' + err.message);
        }
    }

    async function loadNotices() {
        try {
            const data = await fetchWithAdmin('/api/admin/notices');
            notices = Array.isArray(data) ? data : [];
            renderNotices();
        } catch (err) {
            console.error('공지 목록 로드 실패', err);
            document.getElementById('noticeList').innerHTML = `
              <div class="empty-list">
                <div class="el-icon">⚠️</div>
                <p>공지 목록을 불러오지 못했습니다.\n${esc(err.message)}</p>
              </div>
            `;
        }
    }

    function renderNotices() {
        const keyword = (document.getElementById('noticeKeyword')?.value || '').trim().toLowerCase();

        const filtered = [...notices]
            .sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0))
            .filter(n => {
                return [n.category || '', n.title || '', n.content || '']
                    .join(' ')
                    .toLowerCase()
                    .includes(keyword);
            });

        document.getElementById('noticeList').innerHTML = filtered.length ? filtered.map(n => `
          <div class="accordion-card">
            <div class="accordion-header" onclick="toggleAccordionCard(this)">
              <div class="accordion-title">${esc(n.title)}</div>
              <div class="accordion-meta">
                <span class="accordion-badge">${esc(n.category)}</span>
                <span class="accordion-date">${esc(formatDate(n.createdAt))}</span>
              </div>
              <div class="accordion-arrow">⌄</div>
            </div>
            <div class="accordion-body">
              <div class="accordion-content">${esc(n.content)}</div>
              <div class="accordion-actions">
                <button class="btn-line" type="button" onclick="editNoticeData(${n.id}, '${jsEsc(n.category)}', '${jsEsc(n.title)}', '${jsEsc(n.content)}')">수정</button>
                <button class="btn-danger" type="button" onclick="deleteNotice(${n.id})">삭제</button>
              </div>
            </div>
          </div>
        `).join('') : `
          <div class="empty-list">
            <div class="el-icon">📭</div>
            <p>등록된 공지사항이 없습니다.</p>
          </div>
        `;
    }

    function openNoticeModal() {
        document.getElementById('noticeModalTitle').textContent = '공지 추가';
        document.getElementById('noticeId').value = '';
        document.getElementById('noticeCategory').value = '공지';
        document.getElementById('noticeTitle').value = '';
        document.getElementById('noticeContent').value = '';
        hideNoticeModalError();
        document.getElementById('noticeModal').classList.add('show');
    }

    function editNoticeData(id, category, title, content) {
        document.getElementById('noticeModalTitle').textContent = '공지 수정';
        document.getElementById('noticeId').value = id;
        document.getElementById('noticeCategory').value = category || '공지';
        document.getElementById('noticeTitle').value = title || '';
        document.getElementById('noticeContent').value = content || '';
        hideNoticeModalError();
        document.getElementById('noticeModal').classList.add('show');
    }

    function closeNoticeModal() {
        document.getElementById('noticeModal').classList.remove('show');
    }

    function showNoticeModalError(message) {
        const el = document.getElementById('noticeModalError');
        el.textContent = message || '오류가 발생했습니다.';
        el.classList.add('show');
    }

    function hideNoticeModalError() {
        document.getElementById('noticeModalError').classList.remove('show');
    }

    async function saveNotice() {
        const id = document.getElementById('noticeId').value.trim();
        const category = document.getElementById('noticeCategory').value.trim();
        const title = document.getElementById('noticeTitle').value.trim();
        const content = document.getElementById('noticeContent').value.trim();

        if (!category || !title || !content) {
            showNoticeModalError('분류, 제목, 내용을 모두 입력하세요.');
            return;
        }

        try {
            if (id) {
                await fetchWithAdmin(`/api/admin/notices/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ category, title, content })
                });
            } else {
                await fetchWithAdmin('/api/admin/notices', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ category, title, content })
                });
            }

            closeNoticeModal();
            await loadNotices();
        } catch (err) {
            console.error(err);
            showNoticeModalError('공지 저장 실패\n' + err.message);
        }
    }

    async function deleteNotice(id) {
        if (!confirm('공지사항을 삭제하시겠습니까?')) return;

        try {
            await fetchWithAdmin(`/api/admin/notices/${id}`, {
                method: 'DELETE'
            });
            await loadNotices();
        } catch (err) {
            console.error(err);
            alert('공지 삭제 실패\n' + err.message);
        }
    }

    async function loadFaqs() {
        try {
            const data = await fetchWithAdmin('/api/admin/faqs');
            faqs = Array.isArray(data) ? data : [];
            renderFaqs();
        } catch (err) {
            console.error('FAQ 목록 로드 실패', err);
            document.getElementById('faqAdminList').innerHTML = `
              <div class="empty-list">
                <div class="el-icon">⚠️</div>
                <p>FAQ 목록을 불러오지 못했습니다.\n${esc(err.message)}</p>
              </div>
            `;
        }
    }

    function renderFaqs() {
        const keyword = (document.getElementById('faqKeyword')?.value || '').trim().toLowerCase();

        const filtered = [...faqs]
            .sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0))
            .filter(f => {
                return [f.category || '', f.question || '', f.answer || '']
                    .join(' ')
                    .toLowerCase()
                    .includes(keyword);
            });

        document.getElementById('faqAdminList').innerHTML = filtered.length ? filtered.map(f => `
          <div class="accordion-card">
            <div class="accordion-header" onclick="toggleAccordionCard(this)">
              <div class="accordion-title">${esc(f.question)}</div>
              <div class="accordion-meta">
                <span class="accordion-badge">${esc(f.category)}</span>
                <span class="accordion-date">${esc(formatDate(f.createdAt))}</span>
              </div>
              <div class="accordion-arrow">⌄</div>
            </div>
            <div class="accordion-body">
              <div class="accordion-content">${esc(f.answer)}</div>
              <div class="accordion-actions">
                <button class="btn-line" type="button" onclick="editFaqData(${f.id}, '${jsEsc(f.category)}', '${jsEsc(f.question)}', '${jsEsc(f.answer)}')">수정</button>
                <button class="btn-danger" type="button" onclick="deleteFaq(${f.id})">삭제</button>
              </div>
            </div>
          </div>
        `).join('') : `
          <div class="empty-list">
            <div class="el-icon">📭</div>
            <p>등록된 FAQ가 없습니다.</p>
          </div>
        `;
    }

    function openFaqModal() {
        document.getElementById('faqModalTitle').textContent = 'FAQ 추가';
        document.getElementById('faqId').value = '';
        document.getElementById('faqCategory').value = '';
        document.getElementById('faqQuestion').value = '';
        document.getElementById('faqAnswer').value = '';
        hideFaqModalError();
        document.getElementById('faqModal').classList.add('show');
    }

    function editFaqData(id, category, question, answer) {
        document.getElementById('faqModalTitle').textContent = 'FAQ 수정';
        document.getElementById('faqId').value = id;
        document.getElementById('faqCategory').value = category || '';
        document.getElementById('faqQuestion').value = question || '';
        document.getElementById('faqAnswer').value = answer || '';
        hideFaqModalError();
        document.getElementById('faqModal').classList.add('show');
    }

    function closeFaqModal() {
        document.getElementById('faqModal').classList.remove('show');
    }

    function showFaqModalError(message) {
        const el = document.getElementById('faqModalError');
        el.textContent = message || '오류가 발생했습니다.';
        el.classList.add('show');
    }

    function hideFaqModalError() {
        document.getElementById('faqModalError').classList.remove('show');
    }

    async function saveFaq() {
        const id = document.getElementById('faqId').value.trim();
        const category = document.getElementById('faqCategory').value.trim();
        const question = document.getElementById('faqQuestion').value.trim();
        const answer = document.getElementById('faqAnswer').value.trim();

        if (!category || !question || !answer) {
            showFaqModalError('카테고리, 질문, 답변을 모두 입력하세요.');
            return;
        }

        try {
            if (id) {
                await fetchWithAdmin(`/api/admin/faqs/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ category, question, answer })
                });
            } else {
                await fetchWithAdmin('/api/admin/faqs', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ category, question, answer })
                });
            }

            closeFaqModal();
            await loadFaqs();
        } catch (err) {
            console.error(err);
            showFaqModalError('FAQ 저장 실패\n' + err.message);
        }
    }

    async function deleteFaq(id) {
        if (!confirm('FAQ를 삭제하시겠습니까?')) return;

        try {
            await fetchWithAdmin(`/api/admin/faqs/${id}`, {
                method: 'DELETE'
            });
            await loadFaqs();
        } catch (err) {
            console.error(err);
            alert('FAQ 삭제 실패\n' + err.message);
        }
    }

    async function bootstrapAdmin() {
        await Promise.all([
            loadInquiries(),
            loadNotices(),
            loadFaqs()
        ]);
    }

    document.addEventListener('DOMContentLoaded', async function () {
        // ✅ 변경: localStorage -> sessionStorage
        const token = sessionStorage.getItem('adminToken');

        if (token) {
            hideLogin();
            await bootstrapAdmin();
        } else {
            showLogin();
        }

        document.getElementById('adminPw').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') adminLogin();
        });
    });
</script>
</body>
</html>
